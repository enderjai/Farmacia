<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FarmaFlow ERP — Farmacia con Consultor</title>
    <!-- Tailwind CSS v3 standalone (production-safe, no build step required) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        // Tailwind config — dark mode via class on <html>
        if (typeof tailwind !== 'undefined') {
            tailwind.config = { darkMode: 'class' };
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        /* Fix for missing Font Awesome icons */
        .fa-cloud-slash::before { content: "\f0c2"; opacity: 0.4; }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        .transition-all { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #1d4ed8; }
        @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:12px; }
        .elasticity-bar { transition: width 0.3s ease; }
        .inventory-table-container { overflow-x:auto; width:100%; -webkit-overflow-scrolling:touch; }
        table { min-width: 600px; }
        #syncStatus { position:fixed; bottom:16px; right:16px; z-index:9999; transition: all 0.4s; }
        @keyframes scanFlash { 0%{background:rgba(16,185,129,0.3);} 100%{background:transparent;} }
        .barcode-flash { animation: scanFlash 0.5s ease-out; }
        @media print {
            body * { visibility: hidden !important; }
            #receiptPrint, #receiptPrint * { visibility: visible !important; }
            #receiptPrint { position:fixed; top:0; left:0; width:80mm; font-family:'Courier New',monospace; font-size:11px; color:#000; background:#fff; }
            @page { size:80mm auto; margin:0; }
        }
        #receiptPrint { display:none; }

        /* ══ SIDEBAR COLLAPSIBLE ══════════════════════════ */
        :root { --sb-w: 240px; }
        #sf-sidebar {
            width: var(--sb-w);
            position: fixed; top:0; left:0; bottom:0; z-index:40;
            display:flex; flex-direction:column;
            background:#fff; border-right:1px solid #e5e7eb;
            transition: transform .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1);
            overflow: hidden;
        }
        .dark #sf-sidebar { background:#1e293b; border-color:#334155; }
        #sf-sidebar.collapsed { transform: translateX(-100%); }
        #sf-main {
            margin-left: var(--sb-w);
            transition: margin-left .28s cubic-bezier(.4,0,.2,1);
            min-height: 100vh;
        }
        #sf-main.sb-collapsed { margin-left: 0; }
        #sf-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:39; }

        /* Mobile: sidebar starts closed, no margin */
        @media (max-width: 767px) {
            #sf-main { margin-left: 0 !important; }
            #sf-sidebar:not(.collapsed) ~ * #sf-overlay { display:block; }
            #sf-topbar { display:flex !important; }
        }
        @media (min-width: 768px) {
            #sf-topbar { display:none !important; }
            #sf-overlay { display:none !important; }
        }

        /* Touch targets */
        @media (hover:none),(pointer:coarse) { button { min-height: 42px; } }

        /* Balneario tab system */
        .sf-tab { display:none; }
        .sf-tab.active { display:block; }
        .sf-tab-btn.active { background:#1d4ed8 !important; color:#fff !important; border-color:#1d4ed8 !important; }

        /* VFD / Visor badge */
        .vfd-badge-on  { background:#dbeafe; color:#1e3a8a; }
        .vfd-badge-off { background:#f1f5f9; color:#64748b; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 min-h-screen">
    <div id="root"></div>

    <script>
        // Estado global de la aplicación
        let currentUser = null;
        let currentTheme = localStorage.getItem('theme') || 'light';
        let currentView = 'dashboard';

        // Apply dark mode to <html> immediately to avoid flash
        (function applyThemeNow() {
            if (currentTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        // ── Sidebar collapse ──────────────────────────────────────
        // Persist sidebar state across renders
        let _sbCollapsed = localStorage.getItem('sf_sb_collapsed') === '1' || window.innerWidth < 768;
        window._toggleSidebar = function() {
            _sbCollapsed = !_sbCollapsed;
            localStorage.setItem('sf_sb_collapsed', _sbCollapsed ? '1' : '0');
            _applySidebar();
            // Update the toggle button icon without full re-render
            const toggleBtns = document.querySelectorAll('.sb-toggle-icon');
            toggleBtns.forEach(el => {
                el.className = 'fas ' + (_sbCollapsed ? 'fa-bars' : 'fa-chevron-left') + ' text-xs sb-toggle-icon';
            });
        };
        window._closeSidebarMobile = function() {
            if (window.innerWidth < 768) { _sbCollapsed = true; localStorage.setItem('sf_sb_collapsed', '1'); _applySidebar(); }
        };
        function _applySidebar() {
            const sb = document.getElementById('sf-sidebar');
            const mn = document.getElementById('sf-main');
            const ov = document.getElementById('sf-overlay');
            const expandBtn = document.getElementById('sf-expand-btn');
            if (!sb) return;
            if (_sbCollapsed) {
                sb.classList.add('collapsed');
                mn?.classList.add('sb-collapsed');
                if (mn) mn.style.marginLeft = '0';
                if (ov) ov.style.display = 'none';
                if (expandBtn) expandBtn.style.display = 'flex';
            } else {
                sb.classList.remove('collapsed');
                mn?.classList.remove('sb-collapsed');
                if (mn && window.innerWidth >= 768) mn.style.marginLeft = '240px';
                if (ov && window.innerWidth < 768) ov.style.display = 'block';
                if (expandBtn) expandBtn.style.display = 'none';
            }
        }

        // ── Almacenes y Puntos de Venta ──────────────────────────
        let almacenes = JSON.parse(localStorage.getItem('sf_almacenes')) || [
            { id: 1, nombre: 'Almacén Principal',  tipo: 'almacen',    descripcion: 'Bodega principal', activo: true },
            { id: 2, nombre: 'Caja Principal',      tipo: 'puntoventa', descripcion: 'Caja principal',   activo: true }
        ];
        function saveAlmacenes() { localStorage.setItem('sf_almacenes', JSON.stringify(almacenes)); }
        function getAlmacenesList()   { return almacenes.filter(a => a.tipo === 'almacen'    && a.activo !== false); }
        function getPuntosVentaList() { return almacenes.filter(a => a.tipo === 'puntoventa' && a.activo !== false); }

        // ── VFD / Visor de cliente (LED/VFD/POS) ─────────────────
        let _vfdPort = null, _vfdWriter = null;
        const _vfdBaud = () => parseInt(localStorage.getItem('sf_vfd_baud') || '9600');
        window.vfdConnect = async function() {
            if (!('serial' in navigator)) { alert('⚠️ Web Serial API no disponible.\nUsa Google Chrome o Microsoft Edge en PC/laptop.\nNo funciona en móvil, Safari ni Firefox.'); return; }
            try {
                _vfdPort = await navigator.serial.requestPort();
                await _vfdPort.open({ baudRate: _vfdBaud() });
                _vfdWriter = _vfdPort.writable.getWriter();
                localStorage.setItem('sf_vfd_on', '1');
                _vfdRefreshStatus();
                alert('✅ Visor conectado');
            } catch(e) { alert('Error al conectar visor: ' + e.message); }
        };
        window.vfdDisconnect = async function() {
            try { if (_vfdWriter) { _vfdWriter.releaseLock(); _vfdWriter = null; } if (_vfdPort) { await _vfdPort.close(); _vfdPort = null; } } catch(e){}
            localStorage.removeItem('sf_vfd_on');
            _vfdRefreshStatus();
        };
        function _vfdRefreshStatus() {
            const on = !!_vfdWriter;
            document.querySelectorAll('.vfd-status').forEach(el => {
                el.textContent = on ? '✅ Conectado' : '⚫ Desconectado';
                el.className = 'vfd-status text-xs px-2 py-1 rounded-full font-semibold ' + (on ? 'vfd-badge-on' : 'vfd-badge-off');
            });
            document.querySelectorAll('.vfd-btn-connect').forEach(el => el.style.display = on ? 'none' : '');
            document.querySelectorAll('.vfd-btn-disconnect').forEach(el => el.style.display = on ? '' : 'none');
        }
        async function _vfdSend(line1, line2) {
            if (!_vfdWriter) return;
            const enc = new TextEncoder();
            const pad = s => (String(s||'').slice(0,20)).padEnd(20);
            try {
                await _vfdWriter.write(new Uint8Array([0x0C])); // clear/form-feed
                await _vfdWriter.write(enc.encode(pad(line1)));
                await _vfdWriter.write(new Uint8Array([0x0D,0x0A]));
                await _vfdWriter.write(enc.encode(pad(line2)));
            } catch(e) { console.warn('VFD write error:', e.message); }
        }
        function vfdShowTotal(total, cambio) {
            _vfdSend(`Total: $${(total||0).toFixed(2)}`, cambio > 0 ? `Cambio: $${cambio.toFixed(2)}` : '');
        }
        window.vfdSendPromo = function(msg) { _vfdSend(msg || '¡BIENVENIDO!', 'FarmaFlow'); };
        window.vfdSendCustom = function() {
            const l1 = document.getElementById('vfdLine1')?.value || '';
            const l2 = document.getElementById('vfdLine2')?.value || '';
            _vfdSend(l1, l2);
        };
        // Hook into processSale to update VFD
        const _origProcessSaleVFD = window.processSale;  // may be undefined at this point; patched later
        
        // Categorías dinámicas (editables por el usuario)
        let categorias = JSON.parse(localStorage.getItem('categorias')) || [
            'Medicamentos Generales', 'Antibióticos', 'Analgésicos y Antiinflamatorios',
            'Vitaminas y Suplementos', 'Dermatología', 'Oftalmología', 'Cardiología',
            'Diabetes y Metabolismo', 'Respiratorio', 'Digestivo y Gastro',
            'Anticonceptivos', 'Pediátricos', 'Oncología', 'Neurología',
            'Higiene y Cuidado Personal', 'Material de Curación', 'Equipos Médicos',
            'Homeopatía y Naturales', 'Cosméticos Farmacéuticos', 'Otros'
        ];
        function saveCategorias() { localStorage.setItem('categorias', JSON.stringify(categorias)); }

        // Agrupaciones de venta personalizables (kit curaciones, paquete vitaminas, etc.)
        let agrupaciones = JSON.parse(localStorage.getItem('agrupaciones')) || [
            { id: 1, nombre: 'Kit Curación Básico', producto_id: null, cantidad: 5, precio_especial: 0, activo: true },
            { id: 2, nombre: 'Paquete Vitamínico Mensual', producto_id: null, cantidad: 4, precio_especial: 0, activo: true }
        ];
        function saveAgrupaciones() { localStorage.setItem('agrupaciones', JSON.stringify(agrupaciones)); }
        
        // Datos de inventario
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [
            { 
                id: 1, sku: 'ANAL-001', nombre: 'Paracetamol 500mg (caja 20)', descripcion: 'Analgésico y antipirético', 
                categoria: 'Analgésicos y Antiinflamatorios', precio_compra: 18, precio_venta: 35, piezas_por_paquete: 20, 
                stock_almacen: 80, stock_puntoventa: 40, codigo_barras: '7501234567890', 
                proveedores: [{ nombre: 'Lab Pisa', precio: 18, fecha: '2025-01-01' }],
                elasticidad: 0.4, margen: 17, imagen: '💊', fecha_caducidad: '2027-06-01', stock_minimo: 15,
                requiere_receta: false, principio_activo: 'Paracetamol', presentacion: 'Tabletas', dosis: '500mg', laboratorio: 'Genérico'
            },
            { 
                id: 2, sku: 'ANTI-001', nombre: 'Amoxicilina 500mg (caps 21)', descripcion: 'Antibiótico de amplio espectro', 
                categoria: 'Antibióticos', precio_compra: 45, precio_venta: 85, piezas_por_paquete: 21, 
                stock_almacen: 35, stock_puntoventa: 15, codigo_barras: '7509876543210', 
                proveedores: [{ nombre: 'Lab Senosiain', precio: 45, fecha: '2025-01-01' }],
                elasticidad: 0.3, margen: 40, imagen: '💉', fecha_caducidad: '2026-12-01', stock_minimo: 10,
                requiere_receta: true, principio_activo: 'Amoxicilina', presentacion: 'Cápsulas', dosis: '500mg', laboratorio: 'Genérico'
            },
            { 
                id: 3, sku: 'VITA-001', nombre: 'Vitamina C 1g (caja 10)', descripcion: 'Suplemento vitamínico', 
                categoria: 'Vitaminas y Suplementos', precio_compra: 22, precio_venta: 48, piezas_por_paquete: 10, 
                stock_almacen: 60, stock_puntoventa: 30, codigo_barras: '7502345678901', 
                proveedores: [{ nombre: 'Bayer', precio: 22, fecha: '2025-01-01' }],
                elasticidad: 1.1, margen: 26, imagen: '🍊', fecha_caducidad: '2028-03-01', stock_minimo: 20,
                requiere_receta: false, principio_activo: 'Ácido Ascórbico', presentacion: 'Efervescentes', dosis: '1000mg', laboratorio: 'Bayer'
            },
            { 
                id: 4, sku: 'DERM-001', nombre: 'Clotrimazol Crema 1%', descripcion: 'Antifúngico tópico', 
                categoria: 'Dermatología', precio_compra: 28, precio_venta: 65, piezas_por_paquete: 1, 
                stock_almacen: 25, stock_puntoventa: 12, codigo_barras: '7503456789012', 
                proveedores: [{ nombre: 'Chinoin', precio: 28, fecha: '2025-01-01' }],
                elasticidad: 0.6, margen: 37, imagen: '🧴', fecha_caducidad: '2027-09-01', stock_minimo: 8,
                requiere_receta: false, principio_activo: 'Clotrimazol', presentacion: 'Crema', dosis: '1% (20g)', laboratorio: 'Chinoin'
            },
            { 
                id: 5, sku: 'CURA-001', nombre: 'Gasas Estériles 10x10 (paq 10)', descripcion: 'Material de curación', 
                categoria: 'Material de Curación', precio_compra: 12, precio_venta: 28, piezas_por_paquete: 10, 
                stock_almacen: 50, stock_puntoventa: 25, codigo_barras: '7504567890123', 
                proveedores: [{ nombre: 'Lohmann & Rauscher', precio: 12, fecha: '2025-01-01' }],
                elasticidad: 0.5, margen: 16, imagen: '🩹', fecha_caducidad: null, stock_minimo: 15,
                requiere_receta: false, principio_activo: null, presentacion: 'Paquete', dosis: null, laboratorio: 'L&R'
            }
        ];
        
        // ── CITAS CON CONSULTOR ─────────────────────────────────────
        let citas = JSON.parse(localStorage.getItem('sf_citas')) || [];
        // { id, paciente_nombre, paciente_telefono, fecha, hora, consultor_id, consultor_nombre,
        //   motivo, estado:'pendiente'|'confirmada'|'en_curso'|'completada'|'cancelada',
        //   notas, receta_emitida, productos_recetados:[{id,nombre,dosis}], creado }
        function saveCitas() { localStorage.setItem('sf_citas', JSON.stringify(citas)); }

        // ── CONSULTORES ─────────────────────────────────────────────
        let consultores = JSON.parse(localStorage.getItem('sf_consultores')) || [
            { id: 1, nombre: 'Dr. García', especialidad: 'Medicina General', horario: 'Lun-Vie 9:00-17:00', activo: true },
            { id: 2, nombre: 'Dra. Martínez', especialidad: 'Nutriología', horario: 'Mar-Jue 10:00-15:00', activo: true }
        ];
        function saveConsultores() { localStorage.setItem('sf_consultores', JSON.stringify(consultores)); }

        // ── HISTORIAL DE RECETAS ────────────────────────────────────
        let recetasHistorial = JSON.parse(localStorage.getItem('sf_recetas')) || [];
        // { id, cita_id, paciente, consultor_nombre, fecha, productos:[{id,nombre,dosis,indicaciones}], observaciones }
        function saveRecetasHistorial() { localStorage.setItem('sf_recetas', JSON.stringify(recetasHistorial)); }
        
        
        let movements = JSON.parse(localStorage.getItem('movements')) || [];
        let sales = JSON.parse(localStorage.getItem('sales')) || [];
        // peopleCount kept for compatibility but unused in pharmacy mode
        let peopleCount = { total: 0, history: [] };
        
        // NUEVO: Costos Variables (agua, luz, gas, servilletas, etc.)
        let variableCosts = JSON.parse(localStorage.getItem('variableCosts')) || [];

        // NUEVO: Costos estructurados completos
        let costos = JSON.parse(localStorage.getItem('costos')) || [];
        // costos: [{id, nombre, tipo, subtipo, monto, frecuencia, dia_pago, descripcion, fecha_inicio, fecha_ultimo_pago, activo, empleado_id}]

        // NUEVO: Empleados
        let empleados = JSON.parse(localStorage.getItem('empleados')) || [];
        // empleados: [{id, nombre, tipo_pago('hora'|'semana'|'quincena'|'mes'), monto, horas_semana, activo, fecha_ingreso}]

        // ── Sistema de solicitudes de inventario ──────────
        let solicitudesInv = JSON.parse(localStorage.getItem('solicitudesInv')) || [];
        // { id, tipo:'pedido'|'conteo_req', estado:'pendiente'|'aprobada'|'rechazada'|'completada',
        //   producto_id, cantidad, motivo, usuario_id, usuario_nombre, fecha,
        //   respuesta_admin, fecha_respuesta, items_conteo:[{producto_id, stock_reportado}] }
        function saveSolicitudes() { localStorage.setItem('solicitudesInv', JSON.stringify(solicitudesInv)); }

        // Precio de entrada al balneario (configurable)
        let precioEntrada = parseFloat(localStorage.getItem('precioEntrada')) || 80;
        function savePrecioEntrada(p) { precioEntrada = p; localStorage.setItem('precioEntrada', p); }
        
        // NUEVO: Recetas para productos transformados
        let recipes = JSON.parse(localStorage.getItem('recipes')) || [
            {
                id: 1,
                nombre: 'Doriloco',
                producto_salida_id: null, // Se creará dinámicamente
                producto_salida_nombre: 'Doriloco Preparado',
                precio_venta: 45,
                ingredientes: [
                    { producto_id: 4, nombre: 'Bolsa de Dorilocos (Base)', cantidad: 1 },
                    { producto_id: null, nombre_insumo: 'Crema', cantidad: 1, es_insumo_general: true, costo_unitario: 2 },
                    { producto_id: null, nombre_insumo: 'Salsa Valentina', cantidad: 2, es_insumo_general: true, costo_unitario: 1 },
                    { producto_id: null, nombre_insumo: 'Queso rallado', cantidad: 1, es_insumo_general: true, costo_unitario: 3 },
                    { producto_id: null, nombre_insumo: 'Cacahuates', cantidad: 1, es_insumo_general: true, costo_unitario: 2 }
                ],
                costo_extra_estimado: 8,
                activo: true
            },
            {
                id: 2,
                nombre: 'Michelada',
                producto_salida_id: null,
                producto_salida_nombre: 'Michelada Preparada',
                precio_venta: 55,
                ingredientes: [
                    { producto_id: 5, nombre: 'Michelada Base', cantidad: 1 },
                    { producto_id: null, nombre_insumo: 'Cerveza (lata)', cantidad: 1, es_insumo_general: true, costo_unitario: 15 },
                    { producto_id: null, nombre_insumo: 'Hielo', cantidad: 1, es_insumo_general: true, costo_unitario: 3 },
                    { producto_id: null, nombre_insumo: 'Limones', cantidad: 2, es_insumo_general: true, costo_unitario: 2 },
                    { producto_id: null, nombre_insumo: 'Salsa Inglesa', cantidad: 1, es_insumo_general: true, costo_unitario: 1 },
                    { producto_id: null, nombre_insumo: 'Sal', cantidad: 1, es_insumo_general: true, costo_unitario: 0.5 }
                ],
                costo_extra_estimado: 21.5,
                activo: true
            }
        ];
        
        // SECURITY: Users are managed exclusively via Firebase Auth + Firestore.
        // No default/hardcoded credentials. Local cache only for display (no passwords stored).
        let users = JSON.parse(localStorage.getItem('sf_users_cache')) || [];
        
        function saveData() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            localStorage.setItem('movements', JSON.stringify(movements));
            localStorage.setItem('sales', JSON.stringify(sales));
            // SECURITY: Never save user passwords to localStorage
            localStorage.setItem('sf_users_cache', JSON.stringify(users.map(u => ({ id: u.id, username: u.username, role: u.role, nombre: u.nombre, email: u.email }))));
            localStorage.setItem('variableCosts', JSON.stringify(variableCosts));
            localStorage.setItem('agrupaciones', JSON.stringify(agrupaciones));
            localStorage.setItem('categorias', JSON.stringify(categorias));
            localStorage.setItem('costos', JSON.stringify(costos));
            localStorage.setItem('empleados', JSON.stringify(empleados));
            localStorage.setItem('solicitudesInv', JSON.stringify(solicitudesInv));
            localStorage.setItem('sf_citas', JSON.stringify(citas));
            localStorage.setItem('sf_consultores', JSON.stringify(consultores));
            localStorage.setItem('sf_recetas', JSON.stringify(recetasHistorial));
        }
        
        function registerMovement(productId, tipo, cantidad, origen, destino, motivo = '') {
            const movement = {
                id: movements.length + 1,
                producto_id: productId,
                usuario_id: currentUser?.id || 1,
                usuario_nombre: currentUser?.nombre || 'Sistema',
                tipo: tipo,
                cantidad: cantidad,
                motivo: motivo,
                origen: origen,
                destino: destino,
                fecha: new Date().toISOString(),
                ip: '127.0.0.1',
                dispositivo: navigator.userAgent
            };
            movements.push(movement);
            saveData();
            return movement;
        }
        
        function generateSKU(categoria, nombre) {
            const prefix = categoria.substring(0, 4).toUpperCase().replace(/[^A-Z]/g, '') || 'PROD';
            const random = Math.floor(Math.random() * 1000);
            return `${prefix}-${random}`;
        }
        
        function calcularElasticidad(precioActual, demandaActual, precioAlternativo, demandaAlternativa) {
            const cambioPrecio = (precioAlternativo - precioActual) / precioActual;
            const cambioDemanda = (demandaAlternativa - demandaActual) / demandaActual;
            if (cambioPrecio === 0) return 1;
            return Math.abs(cambioDemanda / cambioPrecio);
        }
        
        function agregarProveedor(productId, proveedorNombre, precio, fecha) {
            const product = inventory.find(p => p.id === productId);
            if (product) {
                if (!product.proveedores) product.proveedores = [];
                product.proveedores.push({ nombre: proveedorNombre, precio: precio, fecha: fecha });
                const precios = product.proveedores.map(p => p.precio);
                const precioPromedio = precios.reduce((a, b) => a + b, 0) / precios.length;
                product.precio_compra = precioPromedio;
                product.margen = (product.precio_venta || 0) - (product.precio_compra || 0);
                saveData();
                return true;
            }
            return false;
        }
        
        function normalizarTexto(texto) {
            if (!texto) return '';
            return String(texto).toLowerCase().trim().replace(/[áäà]/g, 'a').replace(/[éëè]/g, 'e').replace(/[íïì]/g, 'i').replace(/[óöò]/g, 'o').replace(/[úüù]/g, 'u');
        }
        
        // NUEVA FUNCIÓN: Registrar costo variable
        function registrarCostoVariable(tipo, monto, descripcion = '') {
            const costo = {
                id: variableCosts.length + 1,
                tipo: tipo,
                monto: parseFloat(monto),
                descripcion: descripcion,
                fecha: new Date().toISOString(),
                usuario_id: currentUser?.id || 1,
                usuario_nombre: currentUser?.nombre || 'Sistema'
            };
            variableCosts.push(costo);
            saveData();
            registerMovement(0, 'Costo Variable', monto, 'gasto', 'operacion', `${tipo}: ${descripcion}`);
            return costo;
        }
        
        // NUEVA FUNCIÓN: Obtener total de costos variables por período
        function getTotalVariableCosts(fechaInicio = null, fechaFin = null) {
            let filtered = [...variableCosts];
            if (fechaInicio) {
                filtered = filtered.filter(c => new Date(c.fecha) >= new Date(fechaInicio));
            }
            if (fechaFin) {
                filtered = filtered.filter(c => new Date(c.fecha) <= new Date(fechaFin));
            }
            return filtered.reduce((sum, c) => sum + (c.monto || 0), 0);
        }
        
        // ═══════════════════════════════════════════════
        // SISTEMA DE PRODUCCIÓN FLEXIBLE
        // ═══════════════════════════════════════════════
        function calcularCostoReceta(recipe, cantidad) {
            let costo = 0;
            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    costo += (p ? p.precio_compra : 0) * ing.cantidad * cantidad;
                } else {
                    costo += (ing.costo_unitario || 0) * ing.cantidad * cantidad;
                }
            }
            costo += (recipe.costo_extra || 0) * cantidad;
            return costo;
        }

        function ejecutarProduccion(recipeId, cantidad, precioVentaOverride, costoExtraVariante, varianteNombre) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) { alert('Receta no encontrada'); return false; }
            if (cantidad <= 0) { alert('La cantidad debe ser mayor a 0'); return false; }

            let faltantes = [];
            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (!p) { faltantes.push(`Producto ID ${ing.producto_id} no existe`); continue; }
                    const stock = (p.stock_almacen || 0) + (p.stock_puntoventa || 0);
                    const necesario = ing.cantidad * cantidad;
                    if (stock < necesario) faltantes.push(`${p.nombre}: necesita ${necesario}, tiene ${stock}`);
                }
            }
            if (faltantes.length > 0) { alert('❌ Stock insuficiente:\n' + faltantes.join('\n')); return false; }

            const costoTotal = calcularCostoReceta(recipe, cantidad) + (costoExtraVariante||0) * cantidad;
            const precioVenta = precioVentaOverride > 0 ? precioVentaOverride : recipe.precio_venta;
            // Nombre del producto de salida incluye variante si la hay
            const nombreSalida = varianteNombre
                ? `${recipe.producto_salida_nombre} (${varianteNombre})`
                : recipe.producto_salida_nombre;

            for (const ing of recipe.ingredientes) {
                if (ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (p) {
                        let restante = ing.cantidad * cantidad;
                        const pvDesc = Math.min(p.stock_puntoventa || 0, restante);
                        p.stock_puntoventa = (p.stock_puntoventa || 0) - pvDesc;
                        restante -= pvDesc;
                        if (restante > 0) p.stock_almacen = (p.stock_almacen || 0) - restante;
                        registerMovement(p.id, 'Insumo Producción', ing.cantidad * cantidad, 'inventario', 'produccion',
                            `Insumo para ${cantidad}x "${recipe.nombre}"`);
                    }
                }
            }

            let productoSalida = recipe.producto_salida_id && !varianteNombre
                ? inventory.find(p => p.id === recipe.producto_salida_id)
                : null;
            if (!productoSalida) productoSalida = inventory.find(p => p.nombre === nombreSalida && p.es_producido);

            if (!productoSalida) {
                const newId = Math.max(0, ...inventory.map(p => p.id)) + 1;
                productoSalida = {
                    id: newId,
                    sku: generateSKU('PROD', recipe.nombre + (varianteNombre||'')),
                    nombre: nombreSalida,
                    descripcion: recipe.descripcion || `Producido con receta "${recipe.nombre}"${varianteNombre?' - '+varianteNombre:''}`,
                    categoria: recipe.categoria_salida || 'Productos Producidos',
                    precio_compra: parseFloat((costoTotal / cantidad).toFixed(4)),
                    precio_venta: precioVenta,
                    piezas_por_paquete: 1,
                    stock_almacen: 0,
                    stock_puntoventa: cantidad,
                    codigo_barras: `PROD-${recipeId}-${Date.now()}`,
                    proveedores: [{ nombre: 'Producción Interna', precio: costoTotal / cantidad, fecha: new Date().toISOString().split('T')[0] }],
                    elasticidad: 1.0,
                    margen: precioVenta - costoTotal / cantidad,
                    imagen: recipe.imagen || '🏭',
                    es_producido: true,
                    receta_id: recipeId
                };
                inventory.push(productoSalida);
                if (!varianteNombre) recipe.producto_salida_id = productoSalida.id;
            } else {
                const stockActual = (productoSalida.stock_puntoventa || 0) + (productoSalida.stock_almacen || 0);
                const nuevoPrecioCompra = stockActual > 0
                    ? ((productoSalida.precio_compra * stockActual) + costoTotal) / (stockActual + cantidad)
                    : costoTotal / cantidad;
                productoSalida.precio_compra = parseFloat(nuevoPrecioCompra.toFixed(4));
                productoSalida.precio_venta = precioVenta;
                productoSalida.margen = precioVenta - productoSalida.precio_compra;
                productoSalida.stock_puntoventa = (productoSalida.stock_puntoventa || 0) + cantidad;
            }

            registerMovement(productoSalida.id, 'Producción', cantidad, 'produccion', 'punto_venta',
                `Producidos ${cantidad}x "${recipe.nombre}" | Costo: $${costoTotal.toFixed(2)}`);
            saveData();
            return { costoTotal, precioVenta, costoUnitario: costoTotal / cantidad };
        }

        // EXPORTACIÓN — columnas fijas para re-importación perfecta
        window.exportInventory = function() {
            const exportData = inventory.map(p => ({

                'Precio_Compra': parseFloat((p.precio_compra || 0).toFixed(2)),
                'Precio_Venta': parseFloat((p.precio_venta || 0).toFixed(2)),

                'Elasticidad': parseFloat((p.elasticidad || 1.0).toFixed(2)),

            }));
            const ws = XLSX.utils.json_to_sheet(exportData);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
            XLSX.writeFile(wb, `inventario_farmacia_${new Date().toISOString().split('T')[0]}.xlsx`);
            alert('✅ Inventario exportado. Puedes editar el archivo y volver a importarlo sin problemas.');
        };

        // Parsear una fila de Excel a objeto producto normalizado
        function parsearFilaExcel(row) {
            let nombre = row['Producto/Nombre'] || row['Producto'] || row['Nombre'] || row['nombre'] || row['NOMBRE'] || '';
            nombre = String(nombre).trim();
            if (!nombre) return null;

            let sku = row['SKU'] || row['sku'] || row['Codigo'] || row['Código'] || '';
            sku = String(sku).trim();

            let categoria = row['Categoría'] || row['Categoria'] || row['CATEGORIA'] || row['categoria'] || 'Otros';
            categoria = String(categoria).trim();

            const leerNum = (campos, def = 0) => {
                for (const c of campos) {
                    if (row[c] !== undefined && row[c] !== '') {
                        const v = parseFloat(String(row[c]).replace(',', '.'));
                        if (!isNaN(v)) return v;
                    }
                }
                return def;
            };
            const leerInt = (campos, def = 0) => {
                for (const c of campos) {
                    if (row[c] !== undefined && row[c] !== '') {
                        const v = parseInt(String(row[c]).replace(',', '.'));
                        if (!isNaN(v)) return v;
                    }
                }
                return def;
            };

            // Stock: primero columnas separadas (formato export), luego columna única
            let stockAlmacen = leerInt(['Stock_Almacen', 'stock_almacen', 'Almacén', 'Almacen'], -1);
            let stockPV = leerInt(['Stock_PuntoVenta', 'stock_puntoventa', 'PuntoVenta', 'Punto_Venta'], -1);
            let stockTotal = leerInt(['Cantidad/Stock', 'Cantidad', 'cantidad', 'Stock', 'stock', 'STOCK'], -1);

            // Si vienen columnas separadas las usamos directamente
            if (stockAlmacen === -1 && stockPV === -1) {
                // Solo tenemos stock total
                const st = stockTotal < 0 ? 0 : stockTotal;
                stockAlmacen = Math.floor(st * 0.7);
                stockPV = st - stockAlmacen;
            } else {
                if (stockAlmacen < 0) stockAlmacen = 0;
                if (stockPV < 0) stockPV = 0;
            }

            let precioCompra = leerNum(['Precio_Compra','precio_compra','Compra','COMPRA']);
            let precioVenta = leerNum(['Precio_Venta','precio_venta','Venta','VENTA']);
            if (precioVenta <= 0 && precioCompra > 0) precioVenta = parseFloat((precioCompra * 1.5).toFixed(2));

            let codigo = row['Código_Barras'] || row['Codigo_Barras'] || row['codigo_barras'] || row['Codigo'] || '';
            codigo = String(codigo).trim() || `COD-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;

            let proveedor = row['Proveedor'] || row['proveedor'] || 'Importado';
            proveedor = String(proveedor).trim();

            let elasticidad = leerNum(['Elasticidad','elasticidad'], 1.0);
            if (elasticidad <= 0) elasticidad = 1.0;

            let imagen = row['Icono/Imagen'] || row['Icono'] || row['imagen'] || '📦';
            imagen = String(imagen).trim() || '📦';

            let descripcion = row['Descripción'] || row['Descripcion'] || row['descripcion'] || '';
            descripcion = String(descripcion).trim();

            return { nombre, sku, categoria, stockAlmacen, stockPV, precioCompra, precioVenta, codigo, proveedor, elasticidad, imagen, descripcion };
        }

        // Ejecutar la importación con el modo elegido
        function ejecutarImportacion(jsonData, modo) {
            let agregados = 0, actualizados = 0, errores = [];

            for (const row of jsonData) {
                try {
                    const p = parsearFilaExcel(row);
                    if (!p) { errores.push('Fila sin nombre: ' + JSON.stringify(row).slice(0,60)); continue; }

                    // Buscar existente por SKU primero (más preciso), luego por nombre normalizado
                    let existingIdx = -1;
                    if (p.sku) existingIdx = inventory.findIndex(x => x.sku && x.sku.trim() === p.sku);
                    if (existingIdx === -1) existingIdx = inventory.findIndex(x => normalizarTexto(x.nombre) === normalizarTexto(p.nombre));

                    if (existingIdx !== -1) {
                        const ex = inventory[existingIdx];
                        const stockPrevio = (ex.stock_almacen || 0) + (ex.stock_puntoventa || 0);
                        const nuevoTotal = p.stockAlmacen + p.stockPV;

                        if (modo === 'reemplazar') {
                            ex.stock_almacen = p.stockAlmacen;
                            ex.stock_puntoventa = p.stockPV;
                        } else { // sumar
                            ex.stock_almacen = (ex.stock_almacen || 0) + p.stockAlmacen;
                            ex.stock_puntoventa = (ex.stock_puntoventa || 0) + p.stockPV;
                        }
                        if (p.precioCompra > 0) ex.precio_compra = p.precioCompra;
                        if (p.precioVenta > 0) ex.precio_venta = p.precioVenta;
                        ex.margen = (ex.precio_venta || 0) - (ex.precio_compra || 0);
                        ex.categoria = p.categoria;
                        ex.codigo_barras = p.codigo;
                        ex.elasticidad = p.elasticidad;
                        ex.imagen = p.imagen;
                        if (p.descripcion) ex.descripcion = p.descripcion;
                        if (!ex.proveedores) ex.proveedores = [];
                        // Evitar proveedor duplicado
                        if (!ex.proveedores.find(pv => pv.nombre === p.proveedor)) {
                            ex.proveedores.push({ nombre: p.proveedor, precio: p.precioCompra, fecha: new Date().toISOString().split('T')[0] });
                        }
                        registerMovement(ex.id, 'Importación', nuevoTotal, 'importacion', 'almacen',
                            `Modo: ${modo}. Stock anterior: ${stockPrevio} → Nuevo: ${(ex.stock_almacen||0)+(ex.stock_puntoventa||0)}`);
                        actualizados++;
                    } else {
                        const newId = Math.max(0, ...inventory.map(x => x.id)) + 1;
                        inventory.push({
                            id: newId,
                            sku: p.sku || generateSKU(p.categoria, p.nombre),
                            nombre: p.nombre,
                            descripcion: p.descripcion,
                            categoria: p.categoria,
                            precio_compra: p.precioCompra,
                            precio_venta: p.precioVenta,
                            piezas_por_paquete: 1,
                            stock_almacen: p.stockAlmacen,
                            stock_puntoventa: p.stockPV,
                            codigo_barras: p.codigo,
                            proveedores: [{ nombre: p.proveedor, precio: p.precioCompra, fecha: new Date().toISOString().split('T')[0] }],
                            elasticidad: p.elasticidad,
                            margen: p.precioVenta - p.precioCompra,
                            imagen: p.imagen
                        });
                        agregados++;
                    }
                } catch(err) {
                    errores.push(err.message);
                }
            }
            saveData();
            return { agregados, actualizados, errores };
        }

        const FREQ_LABELS = { diario:'Diario', semanal:'Semanal', quincenal:'Quincenal', mensual:'Mensual', bimestral:'Bimestral', trimestral:'Trimestral', anual:'Anual', unico:'Único/Eventual' };
        const TIPO_COLORS = { fijo:'blue', empleado:'purple', recurrente:'emerald', ocasional:'orange', mantenimiento:'red', compra:'amber' };
        const TIPO_EMOJIS = { fijo:'🏦', empleado:'👷', recurrente:'🔁', ocasional:'⚡', mantenimiento:'🔧', compra:'🛒' };

        function costoMensualEquivalente(c) {
            const m = c.monto || 0;
            switch(c.frecuencia) {
                case 'diario': return m * 30;
                case 'semanal': return m * 4.33;
                case 'quincenal': return m * 2;
                case 'mensual': return m;
                case 'bimestral': return m / 2;
                case 'trimestral': return m / 3;
                case 'anual': return m / 12;
                default: return 0; // único no se proyecta mensual
            }
        }

        function empleadoCostoMensual(e) {
            switch(e.tipo_pago) {
                case 'hora': return (e.monto||0) * (e.horas_semana||40) * 4.33;
                case 'semana': return (e.monto||0) * 4.33;
                case 'quincena': return (e.monto||0) * 2;
                case 'mes': return e.monto||0;
                default: return e.monto||0;
            }
        }

        function calcularResumenCostos() {
            const costosActivos = costos.filter(c => c.activo !== false);
            const mensual = costosActivos.reduce((s,c) => s + costoMensualEquivalente(c), 0);
            const empleadosMensual = empleados.filter(e => e.activo !== false).reduce((s,e) => s + empleadoCostoMensual(e), 0);
            const gastosUnicosEstesMes = variableCosts.filter(c => {
                const d = new Date(c.fecha);
                const hoy = new Date();
                return d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear();
            }).reduce((s,c) => s + (c.monto||0), 0);
            return { mensual: mensual + empleadosMensual + gastosUnicosEstesMes, mensualEstructural: mensual + empleadosMensual, gastosVariables: gastosUnicosEstesMes, empleadosMensual };
        }

                    <div><label class="block text-sm font-medium mb-1">Especialidad *</label>
                        <input type="text" id="cEsp" value="${editing?.especialidad||''}" placeholder="Ej: Medicina General, Nutriología" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700"></div>
                    <div><label class="block text-sm font-medium mb-1">Horario de atención</label>

                </div>
            </div>`;

        };

        window.guardarConsultor = function(editId) {
            const nombre = document.getElementById('cNombre')?.value?.trim();
            const esp = document.getElementById('cEsp')?.value?.trim();
            const horario = document.getElementById('cHorario')?.value?.trim();
            if (!nombre || !esp) { alert('Nombre y especialidad son obligatorios'); return; }
            if (editId) {
                const c = consultores.find(x => x.id === editId);
                if (c) Object.assign(c, { nombre, especialidad: esp, horario });
            } else {
                const newId = consultores.length ? Math.max(...consultores.map(c=>c.id)) + 1 : 1;
                consultores.push({ id: newId, nombre, especialidad: esp, horario, activo: true });
            }
            saveConsultores(); saveData();
            document.querySelectorAll('.modal').forEach(m => m.remove());
            renderConsultoresView();
        };

        window.toggleConsultor = function(id) {
            const c = consultores.find(x => x.id === id);
            if (c) { c.activo = c.activo === false ? true : false; saveConsultores(); renderConsultoresView(); }
        };

        window.deleteConsultor = function(id) {
            if (!confirm('¿Eliminar este consultor? Las citas ya registradas se conservarán.')) return;
            consultores = consultores.filter(c => c.id !== id);
            saveConsultores(); renderConsultoresView();
        };

        window.guardarReceta = function(citaId) {
            const cita = citas.find(c => c.id === citaId);
            if (!cita) return;
            const rows = document.querySelectorAll('#recetaProductosList [data-ridx]');
            const prods = [];
            rows.forEach(row => {
                const id = parseInt(row.querySelector('.rp-prod')?.value);
                const dosis = row.querySelector('.rp-dosis')?.value?.trim();
                const ind = row.querySelector('.rp-ind')?.value?.trim();
                const p = inventory.find(x => x.id === id);
                if (p) prods.push({ id, nombre: p.nombre, dosis, indicaciones: ind });
            });
            const obs = document.getElementById('recetaObs')?.value?.trim();
            cita.productos_recetados = prods;
            cita.receta_observaciones = obs;
            cita.receta_emitida = true;
            cita.estado = 'completada';
            saveCitas();

            const newId = recetasHistorial.length ? Math.max(...recetasHistorial.map(r=>r.id)) + 1 : 1;
            recetasHistorial.push({ id: newId, cita_id: citaId, paciente: cita.paciente_nombre, consultor_nombre: cita.consultor_nombre, fecha: new Date().toISOString(), productos: prods, observaciones: obs });
            saveRecetasHistorial(); saveData();
            document.querySelectorAll('.modal').forEach(m => m.remove());
            alert('✅ Receta guardada correctamente');
            renderCitasView();
        };

        // ── VISTA: CONTROL DE CADUCIDADES ───────────────────
        function renderCaducidadesView() {
            const container = document.getElementById('viewContainer');
            if (!container) return;
            const hoy = new Date();

            const grupos = {
                vencidos:   inventory.filter(p => p.fecha_caducidad && new Date(p.fecha_caducidad) < hoy),
                criticos:   inventory.filter(p => { if(!p.fecha_caducidad) return false; const d=(new Date(p.fecha_caducidad)-hoy)/(1000*60*60*24); return d>=0&&d<=30; }),
                proximos:   inventory.filter(p => { if(!p.fecha_caducidad) return false; const d=(new Date(p.fecha_caducidad)-hoy)/(1000*60*60*24); return d>30&&d<=90; }),
                vigentes:   inventory.filter(p => { if(!p.fecha_caducidad) return false; const d=(new Date(p.fecha_caducidad)-hoy)/(1000*60*60*24); return d>90; }),
                sin_fecha:  inventory.filter(p => !p.fecha_caducidad)
            };

            const renderGrupo = (titulo, icon, color, items, urgente=false) => {
                if (!items.length) return '';
                return `
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden">
                    <div class="p-4 bg-${color}-50 dark:bg-${color}-900/20 border-b border-${color}-200">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${icon}</span>
                            <h3 class="font-bold text-${color}-700 dark:text-${color}-400">${titulo} (${items.length})</h3>
                            ${urgente?`<span class="ml-auto text-xs bg-${color}-600 text-white px-2 py-0.5 rounded-full">⚠️ ACCIÓN REQUERIDA</span>`:''}
                        </div>
                    </div>
                    <div class="divide-y divide-gray-100 dark:divide-slate-700">
                        ${items.sort((a,b)=>(a.fecha_caducidad||'9999')>(b.fecha_caducidad||'9999')?1:-1).map(p => {
                            const diff = p.fecha_caducidad ? Math.round((new Date(p.fecha_caducidad)-hoy)/(1000*60*60*24)) : null;
                            return `
                            <div class="flex items-center justify-between p-4">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">${p.imagen||'💊'}</span>
                                    <div>
                                        <p class="font-semibold text-gray-800 dark:text-white">${p.nombre}</p>
                                        <p class="text-xs text-gray-500">${p.categoria} · Stock: ${(p.stock_almacen||0)+(p.stock_puntoventa||0)} uds</p>
                                    </div>
                                </div>
                                <div class="text-right flex-shrink-0 ml-3">
                                    ${p.fecha_caducidad
                                        ? `<p class="font-bold text-sm text-${color}-600">${new Date(p.fecha_caducidad+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})}</p>
                                           <p class="text-xs text-gray-400">${diff !== null ? (diff < 0 ? `Venció hace ${Math.abs(diff)} días` : diff===0 ? 'Vence HOY' : `En ${diff} día${diff!==1?'s':''}`) : ''}</p>`
                                        : `<p class="text-xs text-gray-400">Sin fecha registrada</p>`}
                                    <button onclick="window.editarCaducidad(${p.id})" class="text-xs text-blue-500 hover:underline mt-1 block">Editar fecha</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            };

            container.innerHTML = `
            <div class="animate-slide-in">
                <div class="flex items-center justify-between mb-5">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">⏰ Control de Caducidades</h1>
                        <p class="text-sm text-gray-500 mt-0.5">Monitoreo de fechas de vencimiento de medicamentos</p>
                    </div>
                    <button onclick="window.exportarCaducidades()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-semibold">
                        <i class="fas fa-file-excel mr-1"></i>Exportar
                    </button>
                </div>
                <!-- Resumen -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                    <div class="bg-red-50 dark:bg-red-900/20 rounded-2xl p-4 text-center border border-red-200">
                        <p class="text-2xl font-bold text-red-600">${grupos.vencidos.length}</p>
                        <p class="text-xs text-gray-500 mt-1">🚨 Vencidos</p>
                    </div>
                    <div class="bg-orange-50 dark:bg-orange-900/20 rounded-2xl p-4 text-center border border-orange-200">
                        <p class="text-2xl font-bold text-orange-600">${grupos.criticos.length}</p>
                        <p class="text-xs text-gray-500 mt-1">🔴 &lt;30 días</p>
                    </div>
                    <div class="bg-amber-50 dark:bg-amber-900/20 rounded-2xl p-4 text-center border border-amber-200">
                        <p class="text-2xl font-bold text-amber-600">${grupos.proximos.length}</p>
                        <p class="text-xs text-gray-500 mt-1">🟡 30-90 días</p>
                    </div>
                    <div class="bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-4 text-center border border-emerald-200">
                        <p class="text-2xl font-bold text-emerald-600">${grupos.vigentes.length}</p>
                        <p class="text-xs text-gray-500 mt-1">✅ Vigentes</p>
                    </div>
                    <div class="bg-gray-50 dark:bg-slate-700 rounded-2xl p-4 text-center">
                        <p class="text-2xl font-bold text-gray-400">${grupos.sin_fecha.length}</p>
                        <p class="text-xs text-gray-500 mt-1">⚪ Sin fecha</p>
                    </div>
                </div>
                <div class="space-y-4">
                    ${renderGrupo('🚨 VENCIDOS — Retirar inmediatamente','🚨','red', grupos.vencidos, true)}
                    ${renderGrupo('🔴 Vencen en menos de 30 días','🔴','orange', grupos.criticos, true)}
                    ${renderGrupo('🟡 Vencen en 30-90 días','🟡','amber', grupos.proximos)}
                    ${renderGrupo('✅ Productos Vigentes (>90 días)','✅','emerald', grupos.vigentes)}
                    ${renderGrupo('⚪ Sin fecha de caducidad registrada','⚪','gray', grupos.sin_fecha)}
                    ${!grupos.vencidos.length&&!grupos.criticos.length&&!grupos.proximos.length&&!grupos.vigentes.length&&!grupos.sin_fecha.length
                        ? `<div class="text-center py-16 text-gray-400"><div class="text-6xl mb-4">📦</div><p>Sin productos en inventario</p></div>` : ''}
                </div>
            </div>`;
        }

        window.editarCaducidad = function(productId) {
            const p = inventory.find(x => x.id === productId);
            if (!p) return;
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm">
                <div class="p-5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-t-2xl">
                    <h2 class="font-bold text-lg">⏰ Editar Caducidad</h2>
                    <p class="text-sm opacity-80">${p.nombre}</p>
                </div>
                <div class="p-5">
                    <label class="block text-sm font-medium mb-2">Fecha de caducidad</label>
                    <input type="date" id="nuevaCaducidad" value="${p.fecha_caducidad||''}" class="w-full px-3 py-2 border-2 rounded-xl dark:bg-slate-700 focus:border-amber-400 outline-none">
                    <p class="text-xs text-gray-400 mt-2">Deja vacío para marcar como "sin caducidad"</p>
                </div>
                <div class="p-5 border-t border-gray-200 dark:border-slate-700 flex gap-3">
                    <button onclick="window._guardarCaducidad(${productId})" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2.5 rounded-xl font-semibold">Guardar</button>
                    <button onclick="this.closest('.modal').remove()" class="px-5 bg-gray-100 dark:bg-slate-700 rounded-xl">Cancelar</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
        };

        window._guardarCaducidad = function(productId) {
            const p = inventory.find(x => x.id === productId);
            if (p) {
                p.fecha_caducidad = document.getElementById('nuevaCaducidad')?.value || null;
                saveData();
            }
            document.querySelectorAll('.modal').forEach(m => m.remove());
            renderCaducidadesView();
        };

        window.exportarCaducidades = function() {
            const data = inventory.filter(p => p.fecha_caducidad).map(p => ({
                Nombre: p.nombre,
                SKU: p.sku,
                Categoría: p.categoria,
                'Fecha Caducidad': p.fecha_caducidad,
                'Stock Total': (p.stock_almacen||0)+(p.stock_puntoventa||0),
                Estado: (() => {
                    const d = (new Date(p.fecha_caducidad)-new Date())/(1000*60*60*24);
                    return d<0?'VENCIDO':d<=30?'CRÍTICO (<30 días)':d<=90?'PRÓXIMO (30-90 días)':'VIGENTE';
                })()
            }));
            if (!data.length) { alert('Sin productos con fecha de caducidad'); return; }
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Caducidades');
            XLSX.writeFile(wb, `caducidades_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        window.crearSolicitudConteo = function() {
            const newId = solicitudesInv.length ? Math.max(...solicitudesInv.map(s=>s.id)) + 1 : 1;
            solicitudesInv.push({
                id: newId, tipo: 'conteo_req', estado: 'pendiente',
                usuario_id: currentUser?.id, usuario_nombre: currentUser?.nombre,
                fecha: new Date().toISOString(), items_conteo: []
            });
            saveSolicitudes();
            renderAdminRequestsView();
            alert('✅ Solicitud de conteo enviada. El empleado la verá en su menú "Conteo Pendiente".');
        };

        window.responderSolicitud = function(id, decision) {
            const s = solicitudesInv.find(x => x.id === id);
            if (!s) return;
            let nota = '';
            if (decision === 'rechazada') nota = prompt('Motivo del rechazo (opcional):') || '';
            if (decision === 'aprobada') {
                // Transferir stock solicitado de almacén a PV
                const p = inventory.find(x => x.id === s.producto_id);
                if (p) {
                    const qty = Math.min(s.cantidad, p.stock_almacen || 0);
                    if (qty <= 0) { alert('No hay stock suficiente en almacén para transferir.'); decision = 'rechazada'; nota = 'Sin stock en almacén.'; }
                    else {
                        p.stock_almacen -= qty;
                        p.stock_puntoventa = (p.stock_puntoventa || 0) + qty;
                        registerMovement(p.id, 'Pedido Aprobado', qty, 'almacen', 'punto_venta', `Solicitud #${id} aprobada por ${currentUser?.nombre}`);
                        nota = `Transferidos ${qty} u. de almacén a punto de venta`;
                    }
                }
            }
            s.estado = decision;
            s.respuesta_admin = nota;
            s.fecha_respuesta = new Date().toISOString();
            saveData();
            renderAdminRequestsView();
        };

        window.aplicarConteo = function(id) {
            const s = solicitudesInv.find(x => x.id === id);
            if (!s?.items_conteo?.length) return;
            if (!confirm('¿Actualizar el stock de punto de venta con los valores del conteo?')) return;
            for (const item of s.items_conteo) {
                const p = inventory.find(x => x.id === item.producto_id);
                if (p) {
                    registerMovement(p.id, 'Ajuste Conteo', item.stock_reportado - (p.stock_puntoventa||0), 'conteo', 'punto_venta', `Conteo #${id}`);
                    p.stock_puntoventa = item.stock_reportado;
                }
            }
            s.estado = 'aplicado';
            saveData();
            alert('✅ Conteo aplicado al inventario');
            renderAdminRequestsView();
        };

            const recipe = recipes.find(r => r.id === recipeId);

            // Manejo de variantes
            const varSel = document.getElementById('var_' + recipeId);
            let costoExtraVar = 0;
            let varNombre = '';
            if (varSel) {
                costoExtraVar = parseFloat(varSel.value) || 0;
                varNombre = varSel.options[varSel.selectedIndex]?.dataset?.nombre || '';
            }

            const pvEl = document.getElementById('pv_' + recipeId);
            const pv = pvEl ? (parseFloat(pvEl.value) || 0) : 0;

            // Nombre del producto de salida incluye variante
            const nombreSalidaOriginal = recipe?.producto_salida_nombre;
            if (varNombre && recipe) {
                recipe._varianteActual = varNombre;
                recipe._costoExtraVarActual = costoExtraVar;
            }

            const result = ejecutarProduccion(recipeId, qty, pv, costoExtraVar, varNombre);
            if (recipe) { delete recipe._varianteActual; delete recipe._costoExtraVarActual; }
            if (result) {
                alert(`✅ Producción completada!\n\n📦 Cantidad: ${qty}${varNombre ? ' · ' + varNombre : ''}\n💰 Costo total: $${result.costoTotal.toFixed(2)}\n💵 Precio venta: $${result.precioVenta.toFixed(2)}\n📈 Ganancia estimada: $${(result.precioVenta * qty - result.costoTotal).toFixed(2)}`);
                renderTransformationsView();
            }
        };

        window.saveRecipe = function(editId) {
            const nombre = document.getElementById('rNombre')?.value?.trim();
            const salidaNombre = document.getElementById('rSalidaNombre')?.value?.trim();
            const precioVenta = parseFloat(document.getElementById('rPrecioVenta')?.value) || 0;
            const costoExtra = parseFloat(document.getElementById('rCostoExtra')?.value) || 0;
            const categoria = document.getElementById('rCategoria')?.value || 'Productos Producidos';
            const imagen = document.getElementById('rIcono')?.value?.trim() || '🏭';
            const descripcion = document.getElementById('rDesc')?.value?.trim() || '';
            if (!nombre || !salidaNombre) { alert('El nombre de la receta y el producto de salida son obligatorios'); return; }

            const ingredientes = [];
            const rows = document.querySelectorAll('#ingredientesList [data-idx]');
            for (const row of rows) {
                const qty = parseFloat(row.querySelector('.ing-qty')?.value) || 0;
                if (qty <= 0) continue;

                const catSel = row.querySelector('.ing-cat');
                const prodSel = row.querySelector('.ing-prod');
                const nameEl = row.querySelector('.ing-name');

                if (catSel) {
                    // Ingrediente por categoría
                    const cat = catSel.value;
                    const label = row.querySelector('.ing-label')?.value?.trim() || cat;
                    if (cat) ingredientes.push({ tipo: 'categoria', categoria: cat, cantidad: qty, label });
                } else if (prodSel) {
                    // Ingrediente fijo del inventario
                    const prodId = parseInt(prodSel.value);
                    if (prodId) ingredientes.push({ tipo: 'fijo', producto_id: prodId, cantidad: qty });
                } else if (nameEl) {
                    // Insumo manual
                    const ingName = nameEl.value?.trim();
                    const costEl = row.querySelector('.ing-cost');
                    if (ingName) ingredientes.push({ tipo: 'manual', producto_id: null, nombre_insumo: ingName, cantidad: qty, costo_unitario: parseFloat(costEl?.value)||0, es_insumo_general: true });
                }
            }

            // Variantes de nombre
            const variante_label = document.getElementById('rVarLabel')?.value?.trim() || '';
            const variantes = [];
            document.querySelectorAll('#variantesList [data-vari]').forEach(row => {
                const nombre_v = row.querySelector('.var-nombre')?.value?.trim();
                const costo_extra = parseFloat(row.querySelector('.var-costo')?.value) || 0;
                if (nombre_v) variantes.push({ nombre: nombre_v, costo_extra });
            });

            if (editId) {
                const idx = recipes.findIndex(r => r.id === editId);
                if (idx !== -1) {
                    if (recipes[idx].producto_salida_nombre !== salidaNombre) recipes[idx].producto_salida_id = null;
                    Object.assign(recipes[idx], { nombre, producto_salida_nombre: salidaNombre, precio_venta: precioVenta, costo_extra: costoExtra, categoria_salida: categoria, imagen, descripcion, ingredientes, activo: true, variantes, variante_label });
                }
            } else {
                const newId = Math.max(0, ...recipes.map(r => r.id)) + 1;
                recipes.push({ id: newId, nombre, producto_salida_nombre: salidaNombre, producto_salida_id: null, precio_venta: precioVenta, costo_extra: costoExtra, categoria_salida: categoria, imagen, descripcion, ingredientes, activo: true, variantes, variante_label });
            }
            saveData();
            document.getElementById('recipeModal')?.remove();
            renderTransformationsView();
        };

        window._actualizarCostoProd = function() {
            const qty = parseInt(document.getElementById('prodQty')?.value) || 1;
            const modalEl = document.getElementById('prodModal');
            if (!modalEl) return;

            // Recoger ingredientes por categoría seleccionados
            const selMap = {};
            modalEl.querySelectorAll('.cat-ing-radio:checked').forEach(r => {
                selMap[r.dataset.catidx] = parseInt(r.value);
            });

            // Calcular costo incluyendo los productos por categoría seleccionados
            const recipeId = parseInt(modalEl.querySelector('[onclick*="_confirmarProduccion"]')?.getAttribute('onclick')?.match(/\d+/)?.[0]);
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            let costoTotal = (recipe.costo_extra||0);
            const desglose = [];

            for (const [i, ing] of (recipe.ingredientes||[]).entries()) {
                if (ing.tipo === 'categoria') {
                    const pid = selMap[Object.keys(selMap).find(k => {
                        // match by position among categoria ingredients
                        const catIngs = recipe.ingredientes.filter(x=>x.tipo==='categoria');
                        const catIdx = catIngs.indexOf(ing);
                        return parseInt(k) === catIdx;
                    })];
                    if (pid) {
                        const p = inventory.find(x => x.id === pid);
                        if (p) {
                            costoTotal += (p.precio_compra||0) * ing.cantidad;
                            desglose.push(`${p.imagen||'📦'} ${p.nombre} × ${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`);
                        }
                    }
                } else if (ing.tipo === 'fijo' || ing.producto_id) {
                    const p = inventory.find(x => x.id === ing.producto_id);
                    if (p) {
                        costoTotal += (p.precio_compra||0) * ing.cantidad;
                        desglose.push(`${p.imagen||'📦'} ${p.nombre} × ${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`);
                    }
                } else if (ing.tipo === 'manual') {
                    costoTotal += (ing.costo_unitario||0) * ing.cantidad;
                    desglose.push(`⚗️ ${ing.nombre_insumo} × ${ing.cantidad}: $${((ing.costo_unitario||0)*ing.cantidad).toFixed(2)}`);
                }
            }

            const varIdx = parseInt(modalEl.querySelector('input[name="prodVariante"]:checked')?.value);
            const varExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;
            costoTotal += varExtra;

            const pvInput = parseFloat(document.getElementById('prodPV')?.value) || 0;
            const pv = pvInput > 0 ? pvInput : recipe.precio_venta;
            const totalQty = costoTotal * qty;
            const ganancia = (pv - costoTotal) * qty;

            const resEl = document.getElementById('prodCostoResumen');
            if (resEl) resEl.innerHTML = `
                ${desglose.map(d=>`<div class="flex justify-between text-xs text-gray-600 dark:text-gray-400"><span>${d}</span></div>`).join('')}
                ${varExtra > 0 ? `<div class="flex justify-between text-xs text-indigo-600"><span>+ Extra variante</span><span>$${varExtra.toFixed(2)}</span></div>` : ''}
                ${recipe.costo_extra > 0 ? `<div class="flex justify-between text-xs text-orange-600"><span>+ Costo fijo receta</span><span>$${recipe.costo_extra.toFixed(2)}</span></div>` : ''}
                <div class="border-t border-gray-200 dark:border-slate-600 mt-2 pt-2 space-y-1">
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Costo unitario:</span><span class="font-semibold text-orange-600">$${costoTotal.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Costo × ${qty}:</span><span class="font-semibold text-red-600">$${totalQty.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">Precio venta:</span><span class="font-semibold text-blue-600">$${pv.toFixed(2)}/u</span></div>
                    <div class="flex justify-between font-bold text-base ${ganancia>=0?'text-emerald-600':'text-red-600'}"><span>Ganancia estimada × ${qty}:</span><span>${ganancia>=0?'+':''}$${ganancia.toFixed(2)}</span></div>
                </div>`;
        };

        window._confirmarProduccion = function(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;
            const qty = parseInt(document.getElementById('prodQty')?.value) || 0;

            if (qty <= 0) { alert('Ingresa una cantidad válida'); return; }

            const modalEl = document.getElementById('prodModal');

            // Recoger selecciones por categoría (índice → producto_id)
            const selectedProds = {};
            const catIngs = (recipe.ingredientes||[]).filter(i=>i.tipo==='categoria');
            catIngs.forEach((ing, catIdx) => {
                const sel = modalEl?.querySelector(`input[name="catIng_${catIdx}"]:checked`);
                if (sel) selectedProds[catIdx] = parseInt(sel.value);
            });

            // Validar que todas las categorías tengan selección
            for (let i = 0; i < catIngs.length; i++) {
                if (!selectedProds[i]) { alert(`Selecciona un producto para "${catIngs[i].label||catIngs[i].categoria}"`); return; }
            }

            // Variante de nombre
            const varIdx = parseInt(modalEl?.querySelector('input[name="prodVariante"]:checked')?.value);
            const varNombre = !isNaN(varIdx) ? recipe.variantes?.[varIdx]?.nombre : null;
            const varCostoExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;

            const result = ejecutarProduccion(recipeId, qty, pv, varCostoExtra, varNombre, selectedProds);

                alert(`✅ Producción completada!\n\n📦 Cantidad: ${qty}${varNombre?' · '+varNombre:''}\n💰 Costo total: $${result.costoTotal.toFixed(2)}\n💵 Precio venta: $${result.precioVenta.toFixed(2)}\n📈 Ganancia: $${(result.precioVenta*qty-result.costoTotal).toFixed(2)}`);
                renderTransformationsView();

        // ═══════════════════════════════════════════════

        let invSort = 'nombre_az';

        function getInvRows(search, cat, sort) {
            let list = inventory.map(p => ({...p}));
            if (search) list = list.filter(p => normalizarTexto(p.nombre||'').includes(normalizarTexto(search)) || (p.sku||'').toLowerCase().includes(search.toLowerCase()));
            if (cat && cat !== 'all') list = list.filter(p => p.categoria === cat);
            if (sort === 'nombre_az') list.sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''));
            else if (sort === 'nombre_za') list.sort((a,b) => (b.nombre||'').localeCompare(a.nombre||''));
            else if (sort === 'stock_h_desc') list.sort((a,b) => ((b.stock_almacen||0)+(b.stock_puntoventa||0))-((a.stock_almacen||0)+(a.stock_puntoventa||0)));
            else if (sort === 'stock_l_asc') list.sort((a,b) => ((a.stock_almacen||0)+(a.stock_puntoventa||0))-((b.stock_almacen||0)+(b.stock_puntoventa||0)));
            else if (sort === 'precio_v_desc') list.sort((a,b) => (b.precio_venta||0)-(a.precio_venta||0));
            else if (sort === 'precio_v_asc') list.sort((a,b) => (a.precio_venta||0)-(b.precio_venta||0));
            return list;
        }

        function stockBadge(p) {
            const t = (p.stock_almacen||0)+(p.stock_puntoventa||0);
            const minimo = (p.stock_minimo != null) ? p.stock_minimo : 10;
            if (t === 0) return `<span class="px-2 py-0.5 text-xs rounded-full bg-red-100 text-red-700 font-semibold">Sin stock</span>`;
            if (t <= minimo) return `<span class="px-2 py-0.5 text-xs rounded-full bg-orange-100 text-orange-700 font-semibold">⚠️ Bajo: ${t}</span>`;
            if (t <= minimo * 1.5) return `<span class="px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-700 font-semibold">~Bajo: ${t}</span>`;
            return `<span class="px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 font-semibold">✓ ${t}</span>`;
        }

                    </td>

                    <td class="px-4 py-3 text-sm font-semibold text-gray-800 dark:text-white">$${(p.precio_venta||0).toFixed(2)}</td>

                    </div>

            </div>`;
            document.body.appendChild(modal);
            window._deleteCat = (i) => {
                if (!confirm(`¿Eliminar "${categorias[i]}"?`)) return;
                categorias.splice(i,1); saveCategorias();
                document.getElementById('catList').innerHTML = renderList();
            };
            window._addCat = () => {
                const v = document.getElementById('newCatInput')?.value?.trim();
                if (!v || categorias.includes(v)) { alert(v?'Ya existe':'Escribe un nombre'); return; }
                categorias.push(v); saveCategorias();
                document.getElementById('catList').innerHTML = renderList();
                document.getElementById('newCatInput').value = '';
            };
        };

        window.saveEditProduct = function(pid) {
            pid = parseInt(pid);
            const idx = inventory.findIndex(p => p.id === pid);
            if (idx === -1) { alert('Producto no encontrado'); return; }
            const p = inventory[idx];
            p.nombre = document.getElementById(`eNombre_${pid}`)?.value || p.nombre;
            p.sku = document.getElementById(`eSKU_${pid}`)?.value || p.sku;
            p.categoria = document.getElementById(`eCat_${pid}`)?.value || p.categoria;
            p.codigo_barras = document.getElementById(`eCod_${pid}`)?.value || p.codigo_barras;
            p.precio_compra = parseFloat(document.getElementById(`eCompra_${pid}`)?.value) || 0;
            p.precio_venta = parseFloat(document.getElementById(`eVenta_${pid}`)?.value) || 0;
            p.stock_almacen = parseInt(document.getElementById(`eStockAlm_${pid}`)?.value) || 0;
            p.stock_puntoventa = parseInt(document.getElementById(`eStockPV_${pid}`)?.value) || 0;
            p.imagen = document.getElementById(`eImagen_${pid}`)?.value || p.imagen;
            p.descripcion = document.getElementById(`eDesc_${pid}`)?.value || '';
            p.margen = p.precio_venta - p.precio_compra;
            const cad = document.getElementById(`eCaducidad_${pid}`)?.value;
            p.fecha_caducidad = cad || null;
            const stMin = parseInt(document.getElementById(`eStockMin_${pid}`)?.value);
            if (!isNaN(stMin)) p.stock_minimo = stMin;
            // Pharmacy fields
            p.principio_activo = document.getElementById(`ePrinAct_${pid}`)?.value?.trim() || p.principio_activo || null;
            p.presentacion     = document.getElementById(`ePresent_${pid}`)?.value || p.presentacion || null;
            p.dosis            = document.getElementById(`eDosis_${pid}`)?.value?.trim() || p.dosis || null;
            p.laboratorio      = document.getElementById(`eLab_${pid}`)?.value?.trim() || p.laboratorio || null;
            p.requiere_receta  = document.getElementById(`eReceta_${pid}`)?.checked ?? p.requiere_receta ?? false;
            saveData();
            document.querySelectorAll('.modal').forEach(m => m.remove());
            renderInventoryView();
            alert(`✅ "${p.nombre}" actualizado`);
        };

        window.calcularPrecioRecomendado = function() {
            const costo = parseFloat(document.getElementById('calcCosto')?.value);
            const margen = parseFloat(document.getElementById('calcMargen')?.value);
            const elasticidad = parseFloat(document.getElementById('calcElasticidad')?.value);
            
            if (isNaN(costo) || isNaN(margen)) {
                alert('Ingrese valores válidos');
                return;
            }
            
            let precioBase = costo * (1 + margen / 100);
            let precioRecomendado = precioBase;
            let recomendacion = '';
            
            if (!isNaN(elasticidad)) {
                if (elasticidad < 1) {
                    precioRecomendado = precioBase * 1.2;
                    recomendacion = 'Producto inelástico. Puedes aumentar el precio hasta un 20% más sin afectar significativamente la demanda.';

                    precioRecomendado = precioBase * 0.9;
                    recomendacion = 'Producto muy elástico. Recomendamos un precio más competitivo para maximizar ventas.';
                } else {
                    recomendacion = 'Elasticidad normal. El precio calculado es adecuado para el mercado.';
                }
            } else {
                recomendacion = 'Sin datos de elasticidad. Usando margen estándar.';
            }

            const recomendacionDiv = document.getElementById('recomendacionTexto');
            const resultadoDiv = document.getElementById('resultadoPrecio');
            
            if (precioSpan) precioSpan.innerHTML = `$${precioRecomendado.toFixed(2)}`;
