        // ══════════════════════════════════════════════════════════
        // ████  SISTEMA DE AUTENTICACIÓN  ████
        // Hay dos modos según tenga Firebase configurado o no:
        //   • SIN Firebase  → login local (usuarios en localStorage, sin red)
        //   • CON Firebase  → login por correo/contraseña Firebase Auth
        //                     + login con Google (popup)
        // Los usuarios locales se crean desde Personas → Usuarios.
        // NUNCA se guardan contraseñas en texto claro en la nube.
        // ══════════════════════════════════════════════════════════

        // ── Hash simple para contraseñas locales (sin librería) ──
        async function _hashPass(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        // ── Usuarios locales (localStorage, solo cuando no hay Firebase) ──
        function _getLocalUsers() {
            try { return JSON.parse(localStorage.getItem('sf_local_users') || '[]'); } catch { return []; }
        }
        function _saveLocalUsers(arr) { localStorage.setItem('sf_local_users', JSON.stringify(arr)); }

        // Crea el primer admin local si no existe ningún usuario todavía.
        // Se llama solo cuando NO hay Firebase configurado y la lista está vacía.
        window._setupFirstLocalAdmin = async function(nombre, username, password) {
            if (_getLocalUsers().length > 0) return false; // ya existe alguien
            const hash = await _hashPass(password);
            const admin = { id: 'local-' + Date.now(), username: username.trim(), nombre: nombre.trim(), role: 'admin', hash, creado: new Date().toISOString() };
            _saveLocalUsers([admin]);
            return true;
        };

        // ── Mostrar/ocultar error en el panel de login ────────────
        function _loginErr(msg) {
            const wrap = document.getElementById('loginError');
            const span = document.getElementById('loginErrorMsg');
            if (!wrap) return;
            if (msg) { if(span) span.textContent = msg; wrap.classList.remove('hidden'); }
            else { wrap.classList.add('hidden'); }
        }

        // ── Botón mostrar/ocultar contraseña ─────────────────────
        window._toggleLoginPass = function() {
            const inp = document.getElementById('loginPass');
            const ico = document.getElementById('passEyeIcon');
            if (!inp) return;
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            if (ico) ico.className = 'fas ' + (show ? 'fa-eye-slash' : 'fa-eye') + ' text-sm';
        };

        // ── Handler Firebase: cargar/crear perfil en Firestore ────
        async function _handleFirebaseUser(fbUser) {
            let profile = null;
            try {
                // 1. Buscar por email
                const byEmail = await db.collection(COL.users).where('email','==', fbUser.email).limit(1).get();
                if (!byEmail.empty) {
                    profile = byEmail.docs[0].data();
                } else {
                    // 2. Buscar por UID
                    const byUid = await db.collection(COL.users).doc(fbUser.uid).get();
                    if (byUid.exists) {
                        profile = byUid.data();
                    } else {
                        // 3. Primer usuario → admin; el resto → empleado
                        const any = await db.collection(COL.users).limit(1).get();
                        profile = {
                            id: fbUser.uid, uid: fbUser.uid,
                            email: fbUser.email,
                            nombre: fbUser.displayName || fbUser.email.split('@')[0],
                            role: any.empty ? 'admin' : 'empleado',
                            creado: new Date().toISOString()
                        };
                        await db.collection(COL.users).doc(fbUser.uid).set(profile);
                    }
                }
            } catch(e) {
                // Sin acceso a Firestore: perfil mínimo con rol empleado
                profile = { id: fbUser.uid, uid: fbUser.uid, email: fbUser.email,
                            nombre: fbUser.displayName || fbUser.email.split('@')[0], role: 'empleado' };
            }
            currentUser = profile;
            if (!users.find(u => u.id === currentUser.id))
                users.push({ id: currentUser.id, email: currentUser.email, role: currentUser.role, nombre: currentUser.nombre });
            render();
        }

        // ── Google Sign-In ────────────────────────────────────────
        window._loginGoogle = async function() {
            _loginErr('');
            if (!syncEnabled || !firebase.apps.length) await initFirebase();
            if (!syncEnabled) { _loginErr('⚠️ Configura Firebase primero para usar Google login.'); return; }
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const cred = await firebase.auth().signInWithPopup(provider);
                await _handleFirebaseUser(cred.user);
            } catch(err) {
                if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
                _loginErr('❌ Error con Google: ' + (err.message || err.code));
            }
        };

        // ── Adjuntar eventos al formulario de login ───────────────
        function attachLoginEvents() {
            const form = document.getElementById('loginForm');
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                _loginErr('');
                const rawUser = (document.getElementById('loginUser')?.value || '').trim();
                const pass    = document.getElementById('loginPass')?.value || '';
                const btn     = document.getElementById('loginBtn');

                if (!rawUser || !pass) { _loginErr('⚠️ Completa usuario y contraseña'); return; }
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Verificando…'; }

                const fbCfg = getFirebaseConfig && getFirebaseConfig();
                const hasFirebase = !!fbCfg?.projectId;

                if (hasFirebase) {
                    // ── MODO FIREBASE: autenticar con Firebase Auth ──────
                    if (!syncEnabled || !firebase.apps.length) await initFirebase();
                    if (!syncEnabled) {
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar'; }
                        _loginErr('❌ No se pudo conectar a Firebase. Verifica tu conexión.');
                        return;
                    }
                    const email = rawUser.includes('@') ? rawUser : rawUser + '@stockflow.local';
                    try {
                        const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
                        await _handleFirebaseUser(cred.user);
                        // btn se resetea al re-renderizar
                    } catch(err) {
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar'; }
                        const msgs = {
                            'auth/user-not-found':         'Correo no registrado',
                            'auth/wrong-password':         'Contraseña incorrecta',
                            'auth/invalid-credential':     'Credenciales inválidas',
                            'auth/invalid-email':          'Correo inválido',
                            'auth/too-many-requests':      'Demasiados intentos. Espera unos minutos.',
                            'auth/configuration-not-found':'Firebase no configurado correctamente. Ve a Ajustes → Firebase.',
                            'auth/network-request-failed': 'Sin conexión a internet.',
                        };
                        _loginErr('❌ ' + (msgs[err.code] || err.message));
                    }
                } else {
                    // ── MODO LOCAL: verificar contra localStorage ────────
                    const localUsers = _getLocalUsers();
                    if (localUsers.length === 0) {
                        // Primera vez: redirigir a crear primer admin
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar'; }
                        window._showCreateFirstAdmin();
                        return;
                    }
                    const hash = await _hashPass(pass);
                    const found = localUsers.find(u =>
                        (u.username?.toLowerCase() === rawUser.toLowerCase() ||
                         u.email?.toLowerCase() === rawUser.toLowerCase()) &&
                        u.hash === hash
                    );
                    if (found) {
                        const { hash: _h, ...safeUser } = found;
                        currentUser = safeUser;
                        if (!users.find(u => u.id === currentUser.id)) users.push(safeUser);
                        render();
                    } else {
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar'; }
                        _loginErr('❌ Usuario o contraseña incorrectos');
                    }
                }
            });
        }

        window._confirmCreateAdmin = async function() {
            const nombre   = document.getElementById('setupNombre')?.value?.trim();
            const username = document.getElementById('setupUser')?.value?.trim();
            const pass     = document.getElementById('setupPass')?.value;
            const pass2    = document.getElementById('setupPass2')?.value;
            const errEl    = document.getElementById('setupError');
            const show = msg => { if(errEl){errEl.textContent=msg;errEl.classList.remove('hidden');} };
            if (!nombre || nombre.length < 2)    { show('Escribe tu nombre completo'); return; }
            if (!username || username.length < 3) { show('El usuario debe tener al menos 3 caracteres'); return; }
            if (!pass || pass.length < 8)         { show('La contraseña debe tener al menos 8 caracteres'); return; }
            if (pass !== pass2)                   { show('Las contraseñas no coinciden'); return; }
            const ok = await window._setupFirstLocalAdmin(nombre, username, pass);
            if (!ok) { show('Ya existe un usuario administrador'); return; }
            document.querySelectorAll('.modal').forEach(m => m.remove());
            // Auto-login
            const hash = await _hashPass(pass);
            const user = _getLocalUsers().find(u => u.hash === hash);
            if (user) {
                const { hash: _h, ...safeUser } = user;
                currentUser = safeUser;
                if (!users.find(u => u.id === currentUser.id)) users.push(safeUser);
                render();
            }
        };

        // ── Gestión de usuarios locales (desde el panel admin) ────
        // Agregar usuario local (admin o empleado)
        window.addLocalUser = async function(nombre, username, password, role) {
            const localUsers = _getLocalUsers();
            if (localUsers.find(u => u.username?.toLowerCase() === username.toLowerCase()))
                return { ok: false, msg: 'Ese nombre de usuario ya existe' };
            if (!password || password.length < 8)
                return { ok: false, msg: 'La contraseña debe tener al menos 8 caracteres' };
            const hash = await _hashPass(password);
            const newUser = { id: 'local-' + Date.now(), username: username.trim(), nombre: nombre.trim(), role: role || 'empleado', hash, creado: new Date().toISOString() };
            localUsers.push(newUser);
            _saveLocalUsers(localUsers);
            return { ok: true };
        };

        // Cambiar contraseña de usuario local
        window.changeLocalUserPass = async function(userId, newPassword) {
            if (!newPassword || newPassword.length < 8) return { ok: false, msg: 'Mínimo 8 caracteres' };
            const localUsers = _getLocalUsers();
            const u = localUsers.find(x => x.id === userId);
            if (!u) return { ok: false, msg: 'Usuario no encontrado' };
            u.hash = await _hashPass(newPassword);
            _saveLocalUsers(localUsers);
            return { ok: true };
        };

        // Eliminar usuario local
        window.deleteLocalUser = function(userId) {
            if (userId === currentUser?.id) return { ok: false, msg: 'No puedes eliminarte a ti mismo' };
            const filtered = _getLocalUsers().filter(u => u.id !== userId);
            _saveLocalUsers(filtered);
            return { ok: true };
        };

            const pid = window._currentScanProductId;
            if (!pid) { alert('Selecciona un producto primero'); return; }
            const p = inventory.find(x => x.id === pid);
            if (!p) return;
            const qty = parseInt(document.getElementById('scanQty')?.value) || 1;
            const motivo = document.getElementById('scanMotivo')?.value?.trim() || '';
            if (qty <= 0) { alert('La cantidad debe ser mayor a 0'); return; }

            const origen = scanMode==='salida' ? 'punto_venta' : 'almacen';
            const destino = scanMode==='salida' ? 'salida_manual' : 'punto_venta';

            if (scanMode === 'salida') {
                const stockDisp = (p.stock_almacen||0)+(p.stock_puntoventa||0);
                if (qty > stockDisp) { alert(`Stock insuficiente. Solo hay ${stockDisp} unidades.`); return; }
                const pvDesc = Math.min(p.stock_puntoventa||0, qty);
                p.stock_puntoventa = (p.stock_puntoventa||0) - pvDesc;
                const resto = qty - pvDesc;
                if (resto > 0) p.stock_almacen = (p.stock_almacen||0) - resto;
            } else {
                p.stock_almacen = (p.stock_almacen||0) + qty;

        function renderDashboardExperto() {
            if (currentUser?.role !== 'admin') { currentView='dashboard'; render(); return; }
            const container = document.getElementById('viewContainer');
            if (!container) return;

            // ── Métricas base ──
            const totalSales = sales.reduce((s,v)=>s+(v.total||0), 0);
            const totalCOGS  = sales.reduce((s,v)=>s+(v.total||0)-(v.ganancia||0), 0);
            const totalGananciaBruta = totalSales - totalCOGS;
            const resumen = calcularResumenCostos();
            const costosEstructurales = resumen.mensual * (sales.length > 0
                ? Math.max(1, (new Date()-new Date(sales[0]?.fecha||Date.now())) / (30*24*3600*1000)) : 1);
            const gananciaOperativa = totalGananciaBruta - costosEstructurales;
            const margenBrutoPct    = totalSales > 0 ? (totalGananciaBruta/totalSales*100) : 0;
            const margenOperativoPct= totalSales > 0 ? (gananciaOperativa/totalSales*100) : 0;

            const valorInventario = inventory.reduce((s,p)=>s+(p.precio_compra||0)*((p.stock_almacen||0)+(p.stock_puntoventa||0)), 0);
            const valorInventarioVenta = inventory.reduce((s,p)=>s+(p.precio_venta||0)*((p.stock_almacen||0)+(p.stock_puntoventa||0)), 0);
            const rotacionInventario = valorInventario > 0 ? totalCOGS / valorInventario : 0;
            const diasInventario     = rotacionInventario > 0 ? 365/rotacionInventario : 0;

            const numVentas     = sales.length;
            const ticketPromedio = numVentas > 0 ? totalSales/numVentas : 0;
            const gananciaPromedio = numVentas > 0 ? totalGananciaBruta/numVentas : 0;

            const totalPersonas = (peopleCount.history||[]).filter(h=>h.accion==='entrada').reduce((s,h)=>s+(h.cantidad||0),0);
            const ingresoPersonas = (peopleCount.history||[]).filter(h=>h.accion==='entrada').reduce((s,h)=>s+(h.cobrado||0),0);
            const ingresoPorPersona = totalPersonas > 0 ? ingresoPersonas/totalPersonas : 0;
            const ingresoPorPersonaConVenta = totalPersonas > 0 ? (totalSales+ingresoPersonas)/totalPersonas : 0;

            const productosSinStock = inventory.filter(p=>(p.stock_almacen||0)+(p.stock_puntoventa||0)===0).length;
            const productosBajoStock = inventory.filter(p=>{const t=(p.stock_almacen||0)+(p.stock_puntoventa||0); return t>0&&t<5;}).length;
            const roiInventario = valorInventario > 0 ? (totalGananciaBruta/valorInventario*100) : 0;

            const puntoEquilibrio = resumen.mensual > 0
                ? (margenBrutoPct > 0 ? resumen.mensual / (margenBrutoPct/100) : null) : null;

            const kpi = (icon, titulo, valor, subtitulo, color='text-gray-800') => `
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-slate-700">
                    <div class="flex items-start justify-between mb-1">
                        <span class="text-xl">${icon}</span>
                        <span class="text-xs text-gray-400 text-right leading-tight max-w-[60%]">${subtitulo}</span>
                    </div>
                    <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">${titulo}</p>

                db.collection(COL.users).get(),
                db.collection(COL.variableCosts).get(),
                db.collection(COL.solicitudes).get(),
                db.collection(COL.empleados).get(),
                db.collection(COL.costos).get(),
                db.collection(COL.citas).get(),
                db.collection(COL.consultores).get(),
                db.collection(COL.recetas).get(),
            ]);

            const snap2arr = snap => snap.docs.map(d => d.data());

            if (!invSnap.empty) inventory = snap2arr(invSnap);
            if (!salesSnap.empty) sales = snap2arr(salesSnap);
            if (!movSnap.empty) movements = snap2arr(movSnap);
            if (!usrSnap.empty) users = snap2arr(usrSnap);
            if (!vcSnap.empty) variableCosts = snap2arr(vcSnap);
            if (!solSnap.empty) solicitudesInv = snap2arr(solSnap);
            if (!empSnap.empty) empleados = snap2arr(empSnap);
            if (!cosSnap.empty) costos = snap2arr(cosSnap);
            if (!citasSnap.empty) citas = snap2arr(citasSnap);
            if (!consSnap.empty) consultores = snap2arr(consSnap);
            if (!recSnap.empty) recetasHistorial = snap2arr(recSnap);

            // Config docs
            const [catDoc, agDoc] = await Promise.all([
                db.collection(COL.config).doc('categorias').get(),
                db.collection(COL.config).doc('agrupaciones').get(),
            ]);
            if (catDoc.exists) categorias = catDoc.data().items;
            if (agDoc.exists) agrupaciones = agDoc.data().items;

            // Sync to localStorage as offline cache
            _cacheToLocalStorage();
            render();
        }

        // ── Sincronización periódica ligera (en lugar de onSnapshot) ──
        // Descarga datos de Firestore cada N minutos para detectar cambios de otros dispositivos.
        // Mucho más eficiente: 1 lectura/período vs. una operación por cada cambio remoto.
        let _syncInterval = null;
        function _startPeriodicSync() {
            if (_syncInterval) clearInterval(_syncInterval);
            const SYNC_MINUTES = 3; // descarga cada 3 minutos si hay conexión
            _syncInterval = setInterval(async () => {
                if (!db || !syncEnabled || document.hidden) return;
                try {
                    await loadAllFromFirestore();
                } catch(e) { console.warn('Periodic sync error:', e.message); }
            }, SYNC_MINUTES * 60 * 1000);

            // También sincronizar cuando la pestaña vuelve a estar visible
            document.addEventListener('visibilitychange', async () => {
                if (!document.hidden && db && syncEnabled) {
                    try { await loadAllFromFirestore(); } catch(e) {}
                }
            }, { passive: true });
        }

        // ── Guardar datos (localStorage + Firestore con debounce) ──
        // El debounce agrupa múltiples guardados rápidos en uno solo,
        // reduciendo escrituras a Firestore sin perder ningún dato.
        let _saveDebounceTimer = null;
        const _origSaveData = saveData;
        saveData = async function() {
            // Siempre guardar localmente de inmediato (funciona offline)
            _origSaveData();
            if (!db || !syncEnabled) return;
            // Debounce: esperar 800ms de inactividad antes de escribir a Firestore
            if (_saveDebounceTimer) clearTimeout(_saveDebounceTimer);
            _saveDebounceTimer = setTimeout(async () => {
                try {
                    showSyncStatus('syncing');
                    const batch = db.batch();
                    const upsert = (col, arr) => {
                        arr.forEach(item => {
                            if (item?.id === undefined) return;
                            batch.set(db.collection(col).doc(String(item.id)), item, { merge: true });
                        });
                    };
                    upsert(COL.inventory, inventory);
                    upsert(COL.sales, sales.slice(-500));
                    upsert(COL.movements, movements.slice(-500));
                    upsert(COL.variableCosts, variableCosts);
                    upsert(COL.solicitudes, solicitudesInv);
                    upsert(COL.empleados, empleados);
                    upsert(COL.costos, costos);
                    upsert(COL.citas, citas);
                    upsert(COL.consultores, consultores);
                    upsert(COL.recetas, recetasHistorial);
                    batch.set(db.collection(COL.config).doc('categorias'), { items: categorias });
                    batch.set(db.collection(COL.config).doc('agrupaciones'), { items: agrupaciones });
                    await batch.commit();
                    showSyncStatus('online');
                } catch (err) {
                    console.warn('Sync error:', err.message);
                    showSyncStatus('error', 'Error al sincronizar: ' + err.message.slice(0,60));
                }
            }, 800);
        };

        // También guardar usuarios por separado (con seguridad) - solo en Firestore, sin contraseñas local
        async function saveUsers() {
            // SECURITY: Only save safe (non-password) user data to localStorage
            localStorage.setItem('sf_users_cache', JSON.stringify(users.map(u => ({ id: u.id, email: u.email, role: u.role, nombre: u.nombre, username: u.username }))));
            if (!db || !syncEnabled) return;
            const batch = db.batch();
            users.forEach(u => {
                // Never sync passwords to Firestore - passwords are managed by Firebase Auth only
                const safeUser = { id: u.id, email: u.email || u.username || '', role: u.role, nombre: u.nombre, uid: u.uid || u.id };
                batch.set(db.collection(COL.users).doc(String(u.id)), safeUser, { merge: true });
            });
            await batch.commit().catch(e => console.warn('User sync error:', e.message));
        }

        function _cacheToLocalStorage() {
            try {
                localStorage.setItem('inventory', JSON.stringify(inventory));
                localStorage.setItem('sales', JSON.stringify(sales));
                localStorage.setItem('movements', JSON.stringify(movements));
                // SECURITY: Never cache passwords - only safe user data
                localStorage.setItem('sf_users_cache', JSON.stringify(users.map(u => ({ id: u.id, email: u.email, role: u.role, nombre: u.nombre }))));
                localStorage.setItem('variableCosts', JSON.stringify(variableCosts));
                localStorage.setItem('solicitudesInv', JSON.stringify(solicitudesInv));
                localStorage.setItem('empleados', JSON.stringify(empleados));
                localStorage.setItem('costos', JSON.stringify(costos));
                localStorage.setItem('categorias', JSON.stringify(categorias));
                localStorage.setItem('agrupaciones', JSON.stringify(agrupaciones));
                localStorage.setItem('sf_citas', JSON.stringify(citas));
                localStorage.setItem('sf_consultores', JSON.stringify(consultores));
                localStorage.setItem('sf_recetas', JSON.stringify(recetasHistorial));
            } catch(e) {}
        }

        function showSyncStatus(state, msg) {
            let el = document.getElementById('syncStatus');

        // Auto-parse pegado de firebaseConfig object
        window._autoParseFirebaseConfig = function() {
            const raw = document.getElementById('fb_paste')?.value || '';
            // Extract JSON-like object, handle both JS and JSON syntax
            const clean = raw
                .replace(/^[^{]*/,'')   // trim before {
                .replace(/[^}]*$/,'')   // trim after }
                .replace(/(\w+)\s*:/g, '"$1":')  // quote keys
                .replace(/'/g, '"');     // replace single quotes
            try {
                const obj = JSON.parse(clean);
                const fields = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
                let filled = 0;
                fields.forEach(k => {
                    const el = document.getElementById('fb_' + k);
                    if (el && obj[k]) { el.value = obj[k]; filled++; }
                });
                if (filled > 0) {
                    alert(`✅ Se detectaron ${filled} campos automáticamente. Revisa los valores y haz clic en "Conectar y Sincronizar".`);
                } else {
                    throw new Error('No se encontraron campos');
                }
            } catch(e) {
                const diag = document.getElementById('fbDiagnostic');
                if (diag) {
                    diag.classList.remove('hidden');
                    diag.innerHTML = `<strong>⚠️ No se pudo detectar automáticamente.</strong><br>Asegúrate de pegar el bloque completo que incluye las llaves <code>{</code> y <code>}</code>. Si el problema continúa, ingresa los campos manualmente uno por uno.`;
                }
            }
        };

        window._testFirebaseConnection = async function() {
            const diag = document.getElementById('fbDiagnostic');
            if (diag) { diag.classList.remove('hidden'); diag.innerHTML = '⏳ Probando conexión...'; diag.className = diag.className.replace('red','blue'); }
            try {
                if (!db) await initFirebase();
                if (syncEnabled) {
                    await db.collection('_test').doc('ping').set({ ts: Date.now() });
                    if (diag) { diag.innerHTML = '✅ Conexión exitosa con Firebase Firestore'; diag.className = diag.className.replace('red','emerald'); }
                } else {
                    throw new Error('No se pudo conectar. Verifica que el Project ID sea correcto y que las reglas de Firestore permitan escritura.');
                }
            } catch(e) {
                if (diag) {
                    diag.classList.remove('hidden');
                    diag.innerHTML = `❌ Error: <strong>${e.message}</strong><br><br>
                    <strong>Causas comunes:</strong><br>
                    • Project ID incorrecto — verifica en la consola de Firebase<br>
                    • Reglas de Firestore no publicadas — ve a Firestore → Reglas → Publicar<br>
                    • Firestore no está activado — ve a Compilación → Firestore Database → Crear<br>
                    • apiKey inválida — copia el bloque completo desde la consola`;
                }
            }
        };

        window._saveFirebaseConfig = async function() {
            const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
            const cfg = {};
            for (const k of keys) {
                const v = document.getElementById('fb_' + k)?.value?.trim();
                if (!v) { alert('Completa todos los campos'); return; }
                cfg[k] = v;
            }
            saveFirebaseConfig(cfg);
            document.querySelectorAll('.modal').forEach(m => m.remove());
            await initFirebase();
            if (syncEnabled) {
                alert('✅ Firebase conectado. Tus datos se sincronizan en tiempo real en todos los dispositivos.');
                if (inventory.length > 0) {
                    // Upload existing local data
                    await saveData();
                    alert('📤 Datos locales subidos a la nube.');
                }
                render();
            }
        };

        // ══════════════════════════════════════════════════════════
        // ████  LECTOR DE CÓDIGO DE BARRAS — GLOBAL  ████
        // ══════════════════════════════════════════════════════════

        (function() {
            let barcodeBuffer = '';
            let lastKeyTime = 0;
            const SCANNER_SPEED_MS = 80; // Los scanners escriben < 80ms entre teclas

            document.addEventListener('keydown', (e) => {
                // No capturar si hay un input/textarea enfocado (excepto el de POS)
                const active = document.activeElement;
                const isInputFocused = active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)
                    && active.id !== 'posSearch' && active.id !== 'barcodeGlobal';

                const now = Date.now();
                const isScanner = (now - lastKeyTime) < SCANNER_SPEED_MS || barcodeBuffer.length > 0;

                if (isInputFocused && !isScanner) return;

                if (e.key === 'Enter' && barcodeBuffer.length > 3) {
                    e.preventDefault();
                    processBarcodeInput(barcodeBuffer.trim());
                    barcodeBuffer = '';
                    lastKeyTime = 0;
                    return;
                }
                if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    barcodeBuffer += e.key;
                    lastKeyTime = now;
                    // Auto-clear after 500ms of inactivity
                    setTimeout(() => {
                        if (Date.now() - lastKeyTime >= 450) barcodeBuffer = '';
                    }, 500);
                }
            });

            function processBarcodeInput(code) {
                const product = inventory.find(p =>
                    p.codigo_barras === code ||
                    p.sku === code ||
                    String(p.id) === code
                );
                if (!product) {
                    // Flash and show not-found toast
                    showBarcodeToast(`❌ Código no encontrado: ${code}`, false);
                    return;
                }

                if (currentView === 'sales') {
                    // Agregar al carrito POS
                    window.posAddProduct && window.posAddProduct(product.id);
                    showBarcodeToast(`✅ ${product.imagen||'📦'} ${product.nombre} agregado`, true);
                } else if (currentView === 'inventory') {
                    // Resaltar en tabla
                    showBarcodeToast(`🔍 ${product.nombre} — Stock: ${(product.stock_almacen||0)+(product.stock_puntoventa||0)}`, true);
                    setTimeout(() => {
                        const rows = document.querySelectorAll('#inventoryTableBody tr');
                        rows.forEach(row => {
                            if (row.textContent.includes(product.nombre || '')) {
                                row.scrollIntoView({ behavior:'smooth', block:'center' });
                                row.classList.add('barcode-flash');
                                setTimeout(() => row.classList.remove('barcode-flash'), 600);
                            }
                        });
                    }, 100);
                } else {
                    showBarcodeToast(`📦 ${product.nombre} — $${(product.precio_venta||0).toFixed(2)}`, true);
                }
            }

            function showBarcodeToast(msg, success) {
                let toast = document.getElementById('barcodeToast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'barcodeToast';
                    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;transition:all 0.3s;pointer-events:none;';
                    document.body.appendChild(toast);
                }
                toast.innerHTML = `<div class="px-5 py-3 rounded-2xl shadow-2xl text-white font-semibold text-sm ${success ? 'bg-emerald-600' : 'bg-red-600'}">${msg}</div>`;
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2500);
            }
        })();


        // ══════════════════════════════════════════════════════════
        // ████  IMPRESORA DE TICKETS + CAJÓN — ESC/POS  ████
        // ══════════════════════════════════════════════════════════

        let posSerialPort = null;
        let posWriter = null;

        const ESC = 0x1B; const GS = 0x1D;
        // Comandos ESC/POS
        const CMD = {
            INIT:          [ESC, 0x40],
            CENTER:        [ESC, 0x61, 0x01],
            LEFT:          [ESC, 0x61, 0x00],
            BOLD_ON:       [ESC, 0x45, 0x01],
            BOLD_OFF:      [ESC, 0x45, 0x00],
            DOUBLE_ON:     [GS, 0x21, 0x11],
            DOUBLE_OFF:    [GS, 0x21, 0x00],
            SMALL:         [ESC, 0x21, 0x01],
            NORMAL:        [ESC, 0x21, 0x00],
            FEED3:         [ESC, 0x64, 0x03],
            FEED1:         [ESC, 0x64, 0x01],
            CUT:           [GS, 0x56, 0x42, 0x00],
            OPEN_DRAWER:   [ESC, 0x70, 0x00, 0x19, 0xFA],
        };

        function encodeText(str) {
            return new TextEncoder().encode(str);
        }

        function buildBytes(...parts) {
            const total = parts.reduce((s,p) => s + (Array.isArray(p) ? p.length : p.length), 0);
            const buf = new Uint8Array(total);
            let off = 0;
            for (const p of parts) {
                if (Array.isArray(p)) { buf.set(p, off); off += p.length; }
                else { buf.set(p, off); off += p.length; }
            }
            return buf;
        }

        function line(text, width=42) {
            return encodeText((text + ' '.repeat(Math.max(0, width - text.length))).slice(0, width) + '\n');
        }
        function divider(char='-', width=42) { return encodeText(char.repeat(width) + '\n'); }
        function centerLine(text, width=42) {
            const pad = Math.max(0, Math.floor((width - text.length) / 2));
            return encodeText(' '.repeat(pad) + text + '\n');
        }
        function priceRow(label, price, width=42) {
            const priceStr = '$' + price.toFixed(2);
            const labelTrunc = label.slice(0, width - priceStr.length - 1);
            return encodeText(labelTrunc + ' '.repeat(width - labelTrunc.length - priceStr.length) + priceStr + '\n');
        }

        async function connectPrinter() {
            if (!('serial' in navigator)) {
                alert('⚠️ Tu navegador no soporta Web Serial API.\nUsa Google Chrome o Edge en PC para conectar la impresora.\n\nComo alternativa, puedes imprimir con Ctrl+P.');
                return false;
            }
            try {
                posSerialPort = await navigator.serial.requestPort();
                const baudRate = parseInt(localStorage.getItem('sf_printer_baud') || '9600');
                await posSerialPort.open({ baudRate });
                posWriter = posSerialPort.writable.getWriter();
                localStorage.setItem('sf_printer_connected', '1');
                alert('✅ Impresora conectada correctamente');
                return true;
            } catch (err) {
                alert('No se pudo conectar: ' + err.message);
                return false;
            }
        }

        async function disconnectPrinter() {
            try {
                if (posWriter) { posWriter.releaseLock(); posWriter = null; }
                if (posSerialPort) { await posSerialPort.close(); posSerialPort = null; }
            } catch(e) {}
        }

        async function sendToPrinter(bytes) {
            if (!posWriter) {
                // Fallback: browser print
                printReceiptBrowser();
                return;
            }
            try {
                await posWriter.write(bytes);
            } catch (err) {
                console.warn('Printer write error:', err.message);
                printReceiptBrowser();
            }
        }

        async function openCashDrawer() {
            if (!posWriter) {
                alert('Cajón no conectado. Conecta la impresora primero (el cajón se conecta a través de la impresora).');
                return;
            }
            const cmd = buildBytes(CMD.OPEN_DRAWER);
            await sendToPrinter(cmd).catch(console.warn);
        }

        // Generar ticket ESC/POS como bytes
        function buildReceiptBytes(sale, items, metodo) {
            const posConfig = getPOSConfig();
            const fecha = new Date(sale.fecha || Date.now());
            const fechaStr = fecha.toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });
            const partes = [];

            partes.push(buildBytes(CMD.INIT));
            partes.push(buildBytes(CMD.CENTER));
            partes.push(buildBytes(CMD.BOLD_ON, CMD.DOUBLE_ON));
            partes.push(encodeText((posConfig.nombre || 'MI NEGOCIO') + '\n'));
            partes.push(buildBytes(CMD.DOUBLE_OFF, CMD.BOLD_OFF));
            if (posConfig.subtitulo) partes.push(encodeText(posConfig.subtitulo + '\n'));
            if (posConfig.rfc) partes.push(encodeText('RFC: ' + posConfig.rfc + '\n'));
            partes.push(buildBytes(CMD.LEFT));
            partes.push(buildBytes(CMD.FEED1));
            partes.push(divider());
            partes.push(encodeText(`Ticket #${sale.id}      ${fechaStr}\n`));
            partes.push(encodeText(`Cajero: ${currentUser?.nombre || '—'}\n`));
            partes.push(divider());

            for (const item of items) {
                const subtotal = (item.precio_venta || 0) * (item.cantidad || 1);
                const nombreTrunc = (item.nombre || '').slice(0, 28);
                partes.push(encodeText(`${nombreTrunc}\n`));
                partes.push(priceRow(`  ${item.cantidad}x $${(item.precio_venta||0).toFixed(2)}`, subtotal));
            }

            partes.push(divider('='));
            partes.push(buildBytes(CMD.BOLD_ON));
            partes.push(priceRow('TOTAL', sale.total || 0));
            partes.push(buildBytes(CMD.BOLD_OFF));
            partes.push(encodeText(`Pago: ${metodo || 'efectivo'}\n`));

            if ((sale.billete_pago||0) > 0) {
                partes.push(priceRow('Efectivo entregado', sale.billete_pago));
                partes.push(priceRow('Cambio', sale.cambio_dado || 0));
            }

            partes.push(divider());
            partes.push(buildBytes(CMD.CENTER));
            partes.push(encodeText((posConfig.mensaje_final || '¡Gracias por su visita!') + '\n'));
            if (posConfig.telefono) partes.push(encodeText('Tel: ' + posConfig.telefono + '\n'));
            partes.push(buildBytes(CMD.FEED3));
            partes.push(buildBytes(CMD.CUT));

            const totalLen = partes.reduce((s, p) => s + p.length, 0);
            const result = new Uint8Array(totalLen);
            let off = 0;
            for (const p of partes) { result.set(p, off); off += p.length; }
            return result;
        }

        // Fallback: imprimir con CSS de recibo en el navegador
        function buildReceiptHTML(sale, items, metodo) {
            const posConfig = getPOSConfig();
            const fecha = new Date(sale.fecha || Date.now()).toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'});
            return `

                <div style="text-align:center;font-weight:bold;font-size:14px;">${posConfig.nombre||'MI NEGOCIO'}</div>
                ${posConfig.subtitulo ? `<div style="text-align:center;font-size:10px;">${posConfig.subtitulo}</div>` : ''}
                ${posConfig.rfc ? `<div style="text-align:center;font-size:10px;">RFC: ${posConfig.rfc}</div>` : ''}
                <div style="border-top:1px dashed #000;margin:4px 0;"></div>
                <div>Ticket #${sale.id} &nbsp; ${fecha}</div>
                <div>Cajero: ${currentUser?.nombre||'—'}</div>
                <div style="border-top:1px dashed #000;margin:4px 0;"></div>
                ${items.map(item => `
                    <div>${(item.nombre||'').slice(0,30)}</div>
                    <div style="display:flex;justify-content:space-between;">
                        <span>&nbsp;&nbsp;${item.cantidad}x $${(item.precio_venta||0).toFixed(2)}</span>

                    </div>`).join('')}

                <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:13px;">
                    <span>TOTAL</span><span>$${(sale.total||0).toFixed(2)}</span>
                </div>
                <div>Pago: ${metodo||'efectivo'}</div>
                ${(sale.billete_pago||0) > 0 ? `
                <div style="display:flex;justify-content:space-between;"><span>Efectivo</span><span>$${(sale.billete_pago||0).toFixed(2)}</span></div>
                <div style="display:flex;justify-content:space-between;"><span>Cambio</span><span>$${(sale.cambio_dado||0).toFixed(2)}</span></div>` : ''}
                <div style="border-top:1px dashed #000;margin:4px 0;"></div>
                <div style="text-align:center;">${posConfig.mensaje_final||'¡Gracias por su visita!'}</div>
                ${posConfig.telefono ? `<div style="text-align:center;">Tel: ${posConfig.telefono}</div>` : ''}
            </div>`;
        }

        function printReceiptBrowser() {
            const el = document.getElementById('receiptPrint');
            if (!el) return;
            el.style.display = 'block';
            window.print();
            setTimeout(() => { el.style.display = 'none'; }, 1000);
        }

        // Función principal de impresión de ticket
        async function printReceipt(sale, items, metodo) {
            const posConfig = getPOSConfig();
            if (!posConfig.print_enabled) return;

            // Insertar HTML de recibo (para fallback de navegador)
            let receiptEl = document.getElementById('receiptPrint');
            if (receiptEl) receiptEl.remove();
            const div = document.createElement('div');
            div.innerHTML = buildReceiptHTML(sale, items, metodo);
            document.body.appendChild(div.firstElementChild);

            if (posWriter) {
                // ESC/POS directo
                const bytes = buildReceiptBytes(sale, items, metodo);
                await sendToPrinter(bytes);
            } else if (posConfig.print_browser) {
                printReceiptBrowser();
            }
        }
