        window.executeTransfer = function(productId) {
            const product = inventory.find(p => p.id === productId);
            const direction = document.getElementById('transferDirection')?.value;
            const quantity = parseInt(document.getElementById('transferQuantity')?.value);
            const reason = document.getElementById('transferReason')?.value || 'Transferencia interna';
            const cuenta = document.getElementById('transferAccount')?.value?.trim() || DEFAULT_TRANSFER_ACCOUNT;
            
            // Guardar la cuenta asociada a esta unidad/producto
            if (cuenta) { cuentasPorUnidad[productId] = cuenta; saveCuentasPorUnidad(); }
            
            if (!product) return;
            if (!quantity || quantity <= 0) {
                alert('Ingrese una cantidad válida');
                return;
            }
            
            if (direction === 'almacen_to_pv') {
                if ((product.stock_almacen || 0) < quantity) {
                    alert(`No hay suficiente stock en Almacén. Disponible: ${product.stock_almacen || 0}`);
                    return;
                }
                product.stock_almacen = (product.stock_almacen || 0) - quantity;
                product.stock_puntoventa = (product.stock_puntoventa || 0) + quantity;
                registerMovement(productId, 'Transferencia', quantity, 'almacen', 'punto_venta', `${reason} | Cuenta: ${cuenta}`);
            } else {
                if ((product.stock_puntoventa || 0) < quantity) {
                    alert(`No hay suficiente stock en Punto de Venta. Disponible: ${product.stock_puntoventa || 0}`);
                    return;
                }
                product.stock_puntoventa = (product.stock_puntoventa || 0) - quantity;
                product.stock_almacen = (product.stock_almacen || 0) + quantity;
                registerMovement(productId, 'Transferencia', quantity, 'punto_venta', 'almacen', `${reason} | Cuenta: ${cuenta}`);
            }
            
            saveData();
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            renderInventoryView();
            alert(`Transferencia completada: ${quantity} unidades`);
        };

        function getSalesRanking() {

            list.sort((a, b) => (rank[b.id] || 0) - (rank[a.id] || 0));
            return list;

            attachPOSEvents();

        window.toggleProduccionPanel = function() {

        // Abre el mismo modal que producirAhora pero al confirmar agrega al carrito
        window.producirParaCarrito = function(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            const catIngs = (recipe.ingredientes||[]).filter(ing => ing.tipo === 'categoria');

            const costoFijo = calcularCostoReceta({ ...recipe, ingredientes: (recipe.ingredientes||[]).filter(i => i.tipo !== 'categoria') }, 1);

            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-t-2xl flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-bold">${recipe.imagen||'🍽️'} ${recipe.nombre}</h2>
                        <p class="text-sm opacity-80 mt-0.5">Produce al momento y agrega al carrito</p>
                    </div>
                    <button onclick="document.getElementById('prodCarritoModal').remove()" class="p-2 hover:bg-white/20 rounded-lg"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 overflow-y-auto flex-1 space-y-4">

                    <!-- Cantidad -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium mb-1">📦 Cantidad</label>
                            <div class="flex items-center gap-2">
                                <button onclick="var i=document.getElementById('prodCarritoQty'); i.value=Math.max(1,parseInt(i.value)-1); window._actualizarCostoCarrito();"
                                    class="w-10 h-10 bg-gray-100 dark:bg-slate-700 rounded-xl font-bold text-lg active:scale-95">−</button>
                                <input type="number" id="prodCarritoQty" value="1" min="1"
                                    class="flex-1 px-3 py-2 border-2 rounded-xl dark:bg-slate-700 text-lg font-bold text-center"
                                    oninput="window._actualizarCostoCarrito()">
                                <button onclick="var i=document.getElementById('prodCarritoQty'); i.value=parseInt(i.value)+1; window._actualizarCostoCarrito();"
                                    class="w-10 h-10 bg-purple-100 dark:bg-purple-900/30 text-purple-700 rounded-xl font-bold text-lg active:scale-95">+</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">💵 Precio venta (0 = receta)</label>
                            <input type="number" id="prodCarritoPV" value="0" step="0.01"
                                class="w-full px-3 py-2 border-2 rounded-xl dark:bg-slate-700"
                                oninput="window._actualizarCostoCarrito()">
                        </div>
                    </div>

                    ${hasVariantes ? `
                    <div>
                        <label class="block text-sm font-medium mb-2">🔀 ${recipe.variante_label || 'Variante'}</label>
                        <div class="grid grid-cols-2 gap-2">
                            ${recipe.variantes.map((v,i) => `
                            <label class="cursor-pointer">
                                <input type="radio" name="pcVariante" value="${i}" ${i===0?'checked':''} class="sr-only" onchange="window._actualizarCostoCarrito()">
                                <div class="pc-var-btn p-3 rounded-xl border-2 text-center transition-all ${i===0?'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20':'border-gray-200 dark:border-slate-600'} cursor-pointer">
                                    <p class="font-semibold text-sm">${v.nombre}</p>
                                    ${v.costo_extra > 0 ? `<p class="text-xs text-gray-500">+$${v.costo_extra.toFixed(2)}</p>` : ''}
                                </div>
                            </label>`).join('')}
                        </div>
                    </div>` : ''}

                    ${catIngs.map((ing, idx) => {
                        const productos = inventory.filter(p => p.categoria === ing.categoria && ((p.stock_almacen||0)+(p.stock_puntoventa||0)) > 0);
                        const todosProductos = inventory.filter(p => p.categoria === ing.categoria);
                        return `
                        <div>
                            <label class="block text-sm font-medium mb-1">🗂️ ${ing.label || ing.categoria} <span class="text-xs text-gray-500">(${ing.cantidad} u.)</span></label>
                            <p class="text-xs text-gray-400 mb-2">Categoría: <strong>${ing.categoria}</strong> · ${todosProductos.length} en catálogo</p>
                            ${productos.length === 0 ? `<div class="p-3 bg-red-50 dark:bg-red-900/20 rounded-xl text-sm text-red-700">⚠️ Sin stock en "${ing.categoria}"</div>` : `
                            <div class="grid grid-cols-2 gap-2 max-h-44 overflow-y-auto">
                                ${productos.map((p,pi) => {
                                    const stock = (p.stock_almacen||0)+(p.stock_puntoventa||0);
                                    return `
                                    <label class="cursor-pointer">
                                        <input type="radio" name="pcIng_${idx}" value="${p.id}" ${pi===0?'checked':''} class="sr-only pc-ing-radio" data-catidx="${idx}" onchange="window._actualizarCostoCarrito()">
                                        <div class="pc-prod-btn p-2.5 rounded-xl border-2 transition-all ${pi===0?'border-teal-500 bg-teal-50 dark:bg-teal-900/20':'border-gray-200 dark:border-slate-600'} cursor-pointer">
                                            <div class="flex items-center gap-2">
                                                <span class="text-xl">${p.imagen||'📦'}</span>
                                                <div class="min-w-0">
                                                    <p class="text-xs font-semibold truncate">${p.nombre}</p>
                                                    <p class="text-xs text-gray-400">$${(p.precio_compra||0).toFixed(2)} · Stock: ${stock}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </label>`;
                                }).join('')}
                            </div>`}
                        </div>`;
                    }).join('')}

                    <!-- Resumen costo -->
                    <div id="prodCarritoCosto" class="bg-gray-50 dark:bg-slate-700 rounded-2xl p-4 space-y-1.5"></div>
                </div>
                <div class="p-5 border-t border-gray-200 dark:border-slate-700 flex gap-3">
                    <button onclick="window._confirmarProduccionCarrito(${recipeId})"
                        class="flex-1 bg-purple-600 hover:bg-purple-700 active:scale-95 text-white py-3 rounded-xl font-bold text-lg transition-all">
                        🛒 Producir y Agregar al Carrito
                    </button>
                    <button onclick="document.getElementById('prodCarritoModal').remove()" class="px-5 bg-gray-100 dark:bg-slate-700 rounded-xl">Cancelar</button>
                </div>
            </div>`;
            document.body.appendChild(modal);

            // Estilo radio interactivo (igual al modal de producción)
            modal.querySelectorAll('input[type="radio"]').forEach(r => {
                r.addEventListener('change', () => {
                    const name = r.getAttribute('name');
                    modal.querySelectorAll(`input[name="${name}"]`).forEach(sib => {
                        const btn = sib.nextElementSibling;
                        if (!btn) return;
                        const isCat = name.startsWith('pcIng_');
                        btn.className = btn.className
                            .replace(/border-(teal|indigo|gray)-\d+/g,'')
                            .replace(/bg-(teal|indigo|gray|slate)-\S+/g,'')
                            .replace(/dark:bg-\S+/g,'')
                            .trim();
                        if (sib.checked) {
                            btn.className += isCat
                                ? ' border-teal-500 bg-teal-50 dark:bg-teal-900/20'
                                : ' border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20';
                        } else {
                            btn.className += ' border-gray-200 dark:border-slate-600';
                        }
                    });
                });
            });

            window._actualizarCostoCarrito();
        };

        window._actualizarCostoCarrito = function() {
            const modal = document.getElementById('prodCarritoModal');
            if (!modal) return;
            const qty = parseInt(document.getElementById('prodCarritoQty')?.value) || 1;
            const recipeId = parseInt(modal.querySelector('[onclick*="_confirmarProduccionCarrito"]')?.getAttribute('onclick')?.match(/\d+/)?.[0]);
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            const selMap = {};
            modal.querySelectorAll('.pc-ing-radio:checked').forEach(r => { selMap[r.dataset.catidx] = parseInt(r.value); });

            let costo = recipe.costo_extra || 0;
            const desglose = [];

            for (const [i, ing] of (recipe.ingredientes||[]).entries()) {
                const catIngs = (recipe.ingredientes||[]).filter(x=>x.tipo==='categoria');
                if (ing.tipo === 'categoria') {
                    const catIdx = catIngs.indexOf(ing);
                    const pid = selMap[catIdx];
                    if (pid) {
                        const p = inventory.find(x=>x.id===pid);
                        if (p) { costo += (p.precio_compra||0)*ing.cantidad; desglose.push(`${p.imagen||'📦'} ${p.nombre} ×${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`); }
                    }
                } else if (ing.tipo === 'fijo' || (!ing.tipo && ing.producto_id)) {
                    const p = inventory.find(x=>x.id===ing.producto_id);
                    if (p) { costo += (p.precio_compra||0)*ing.cantidad; desglose.push(`${p.imagen||'📦'} ${p.nombre} ×${ing.cantidad}: $${((p.precio_compra||0)*ing.cantidad).toFixed(2)}`); }
                } else if (ing.tipo === 'manual' || ing.es_insumo_general) {
                    costo += (ing.costo_unitario||0)*ing.cantidad;
                    desglose.push(`⚗️ ${ing.nombre_insumo||ing.nombre} ×${ing.cantidad}: $${((ing.costo_unitario||0)*ing.cantidad).toFixed(2)}`);
                }
            }

            const varIdx = parseInt(modal.querySelector('input[name="pcVariante"]:checked')?.value);
            const varExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;
            costo += varExtra;

            const pvInput = parseFloat(document.getElementById('prodCarritoPV')?.value) || 0;
            const pv = pvInput > 0 ? pvInput : recipe.precio_venta;
            const ganancia = (pv - costo) * qty;

            const el = document.getElementById('prodCarritoCosto');
            if (el) el.innerHTML = `
                ${desglose.map(d=>`<div class="text-xs text-gray-500 dark:text-gray-400">${d}</div>`).join('')}
                ${varExtra > 0 ? `<div class="text-xs text-indigo-600">+ Variante: $${varExtra.toFixed(2)}</div>` : ''}
                <div class="border-t border-gray-200 dark:border-slate-600 mt-2 pt-2 space-y-1">
                    <div class="flex justify-between text-sm"><span class="text-gray-500">Costo unitario:</span><span class="font-semibold text-orange-600">$${costo.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-500">Precio de venta:</span><span class="font-semibold text-blue-600">$${pv.toFixed(2)}</span></div>
                    <div class="flex justify-between font-bold ${ganancia>=0?'text-emerald-600':'text-red-600'}">
                        <span>Ganancia ×${qty}:</span><span>${ganancia>=0?'+':''}$${(ganancia).toFixed(2)}</span>
                    </div>
                </div>`;
        };

        window._confirmarProduccionCarrito = function(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;
            const modal = document.getElementById('prodCarritoModal');
            const qty = parseInt(document.getElementById('prodCarritoQty')?.value) || 0;
            const pvInput = parseFloat(document.getElementById('prodCarritoPV')?.value) || 0;
            const pv = pvInput > 0 ? pvInput : recipe.precio_venta;
            if (qty <= 0) { alert('Cantidad inválida'); return; }

            // Recoger selecciones de categoría
            const catIngs = (recipe.ingredientes||[]).filter(i=>i.tipo==='categoria');
            const selectedProds = {};
            catIngs.forEach((ing, catIdx) => {
                const sel = modal?.querySelector(`input[name="pcIng_${catIdx}"]:checked`);
                if (sel) selectedProds[catIdx] = parseInt(sel.value);
            });
            for (let i=0; i<catIngs.length; i++) {
                if (!selectedProds[i]) { alert(`Selecciona un producto para "${catIngs[i].label||catIngs[i].categoria}"`); return; }
            }

            // Variante
            const varIdx = parseInt(modal?.querySelector('input[name="pcVariante"]:checked')?.value);
            const varNombre = !isNaN(varIdx) ? recipe.variantes?.[varIdx]?.nombre : null;
            const varCostoExtra = !isNaN(varIdx) ? (recipe.variantes?.[varIdx]?.costo_extra||0) : 0;

            // Construir receta con ingredientes por categoría resueltos
            const ingResolvedList = (recipe.ingredientes||[]).map((ing, i) => {
                if (ing.tipo === 'categoria') {
                    const catIdx = (recipe.ingredientes||[]).filter(x=>x.tipo==='categoria').indexOf(ing);
                    const pid = selectedProds[catIdx];
                    return pid ? { ...ing, tipo:'fijo', producto_id: pid } : ing;
                }
                return ing;
            });

            // Verificar stock
            const faltantes = [];
            for (const ing of ingResolvedList) {
                if ((ing.tipo==='fijo' || (!ing.tipo && ing.producto_id)) && ing.producto_id) {
                    const p = inventory.find(x=>x.id===ing.producto_id);
                    const stock = (p?.stock_almacen||0)+(p?.stock_puntoventa||0);
                    const necesario = ing.cantidad * qty;
                    if (!p || stock < necesario) faltantes.push(`${p?.nombre||'Ingrediente'}: necesita ${necesario}, tiene ${stock}`);
                }
            }
            if (faltantes.length) { alert('❌ Stock insuficiente:\n'+faltantes.join('\n')); return; }

            // Descontar ingredientes
            let costoTotal = (recipe.costo_extra||0)*qty + varCostoExtra*qty;
            for (const ing of ingResolvedList) {
                if ((ing.tipo==='fijo' || (!ing.tipo && ing.producto_id)) && ing.producto_id) {
                    const p = inventory.find(x=>x.id===ing.producto_id);
                    if (p) {
                        const necesario = ing.cantidad * qty;
                        const pvDesc = Math.min(p.stock_puntoventa||0, necesario);
                        p.stock_puntoventa = (p.stock_puntoventa||0) - pvDesc;
                        const restante = necesario - pvDesc;
                        if (restante > 0) p.stock_almacen = Math.max(0,(p.stock_almacen||0)-restante);
                        costoTotal += (p.precio_compra||0)*necesario;
                        registerMovement(p.id,'Insumo Producción→Venta',necesario,'inventario','produccion',`Receta "${recipe.nombre}"×${qty}`);
                    }
                } else if (ing.tipo==='manual' || ing.es_insumo_general) {
                    costoTotal += (ing.costo_unitario||0)*ing.cantidad*qty;
                }
            }

            // Nombre del producto (incluye variante si la hay)
            const nombreSalida = varNombre
                ? `${recipe.producto_salida_nombre||recipe.nombre} (${varNombre})`
                : (recipe.producto_salida_nombre||recipe.nombre);
            const costoUnitario = costoTotal / qty;
            const margen = pv - costoUnitario;

            saveData();
            modal?.remove();

            // Agregar al carrito como producto virtual (sin stock propio)
            if (!window.cart) window.cart = [];
            const existing = window.cart.find(c => c._recetaId === recipeId && c._varNombre === (varNombre||''));
            if (existing) {
                existing.cantidad += qty;
            } else {
                window.cart.push({
                    id: `receta_${recipeId}_${Date.now()}`,
                    nombre: nombreSalida,
                    imagen: recipe.imagen||'🍽️',
                    precio_venta: pv,
                    precio_compra: costoUnitario,
                    margen: margen,
                    cantidad: qty,
                    categoria: recipe.categoria_salida||'Productos Producidos',
                    _recetaId: recipeId,
                    _varNombre: varNombre||'',
                    _esProducido: true,
                    _unidades: 1
                });
            }
            refreshCartPanels();

            // Toast
            (function(msg) {
                let t = document.getElementById('saleSuccessToast');
                if (!t) { t = document.createElement('div'); t.id = 'saleSuccessToast'; t.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99999;max-width:90vw;pointer-events:none;transition:opacity .3s;'; document.body.appendChild(t); }
                t.innerHTML = `<div class="bg-purple-600 text-white rounded-2xl shadow-2xl px-5 py-3 text-sm font-semibold">${msg}</div>`;
                t.style.opacity='1';
                setTimeout(()=>{t.style.opacity='0';},3000);
            })(`🍽️ ${qty}× ${nombreSalida} agregado al carrito ($${pv.toFixed(2)})`);

            if (window._produccionPanelOpen) {
                document.getElementById('produccionPanel')?.classList.remove('hidden');
            }
        };

        function renderPOSCard(p, rank) {
            const inCart = (window.cart||[]).find(c => c.id === p.id);
            const ventas = rank[p.id] || 0;
            return `
            <button class="pos-card bg-white dark:bg-slate-800 rounded-2xl p-3 shadow-sm border-2
                ${inCart ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-900/20' : 'border-gray-100 dark:border-slate-700'}
                flex flex-col items-center text-center transition-all active:scale-95"
                onclick="window.posAddProduct(${p.id})">
                <span class="text-3xl mb-1">${p.imagen || '📦'}</span>
                <p class="text-xs font-semibold text-gray-800 dark:text-white leading-tight mb-1 line-clamp-2" style="min-height:2em">${p.nombre||''}</p>
                <p class="text-sm font-bold text-emerald-600">$${(p.precio_venta||0).toFixed(2)}</p>
                <p class="text-xs text-gray-400 mt-0.5">Stock: ${p.stock_puntoventa||0}</p>
                ${ventas > 0 ? `<span class="mt-1 text-xs bg-amber-100 text-amber-700 px-2 rounded-full">🔥 ×${ventas}</span>` : ''}
                ${inCart ? `<span class="mt-1 text-xs bg-emerald-100 text-emerald-700 px-2 rounded-full font-bold">en carrito: ${inCart.cantidad}</span>` : ''}
            </button>`;
        }

        function renderCartHTML(isMobile) {
            const items = window.cart || [];
            const total = items.reduce((s, i) => s + (i.precio_venta||0) * (i.cantidad||0), 0);
            const ganancia = items.reduce((s, i) => s + (i.margen||0) * (i.cantidad||0), 0);
            const metodo = window.posPayMethod || 'efectivo';
            const pid = isMobile ? 'M' : 'D';   // sufijo para IDs únicos por panel
            const BILLETES = [20,50,100,200,500,1000];

            return `
            <div class="p-4 border-b border-gray-100 dark:border-slate-700 flex items-center justify-between flex-shrink-0">
                <h3 class="font-bold text-gray-800 dark:text-white">🛒 Carrito <span class="text-emerald-600">(${items.length})</span></h3>
                ${isMobile ? `<button onclick="window.toggleCartPanel()" class="text-gray-400 hover:text-gray-600 p-2"><i class="fas fa-times text-lg"></i></button>` : ''}
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-2 min-h-0">
                ${items.length === 0
                    ? `<div class="text-center py-8 text-gray-400"><div class="text-4xl mb-2">🛒</div><p class="text-sm">Carrito vacío</p></div>`
                    : items.map((item, idx) => `
                        <div class="flex items-center gap-2 p-2 rounded-xl bg-gray-50 dark:bg-slate-700">
                            <span class="text-xl flex-shrink-0">${item.imagen||'📦'}</span>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-semibold text-gray-800 dark:text-white truncate">${item.nombre||''}</p>
                                <p class="text-xs text-emerald-600">$${(item.precio_venta||0).toFixed(2)} c/u</p>
                            </div>
                            <div class="flex items-center gap-1 flex-shrink-0">
                                <button class="qty-btn bg-gray-200 dark:bg-slate-600 rounded-lg text-sm font-bold hover:bg-red-100 dark:hover:bg-red-900/30"
                                    onclick="window.cartQty(${idx},-1)">−</button>
                                <input type="number" value="${item.cantidad||1}" min="1"
                                    class="w-10 text-center text-sm font-bold border rounded-lg dark:bg-slate-600 dark:text-white py-1 outline-none"
                                    onchange="window.cartSetQty(${idx},this.value)" onclick="this.select()">
                                <button class="qty-btn bg-gray-200 dark:bg-slate-600 rounded-lg text-sm font-bold hover:bg-emerald-100 dark:hover:bg-emerald-900/30"
                                    onclick="window.cartQty(${idx},1)">+</button>
                                <button class="qty-btn text-red-400 hover:text-red-600 ml-1" onclick="window.removeFromCart(${idx})">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>
                        </div>`).join('')}
            </div>

            <div class="p-4 border-t border-gray-100 dark:border-slate-700 flex-shrink-0 space-y-3">
                <!-- Ganancia y total -->
                <div class="flex justify-between text-sm text-gray-500">
                    <span>Ganancia estimada</span>
                    <span class="text-emerald-600 font-semibold">$${ganancia.toFixed(2)}</span>
                </div>
                <div class="flex justify-between">
                    <span class="font-bold text-gray-800 dark:text-white text-lg">TOTAL</span>
                    <span class="font-bold text-2xl text-emerald-600" id="cartTotal${pid}">$${total.toFixed(2)}</span>
                </div>

                <!-- Método de pago — solo efectivo y transferencia -->
                <div class="grid grid-cols-2 gap-2">
                    ${['efectivo','transferencia'].map(m => `
                        <button class="pay-btn py-3 rounded-xl text-sm font-semibold border-2 transition-all
                            ${metodo === m
                                ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400'
                                : 'border-gray-200 dark:border-slate-600 text-gray-600 dark:text-gray-400 hover:border-gray-300'}"
                            onclick="window.setPosPayMethod('${m}'); window.recalcChange${pid}();">
                            ${m === 'efectivo' ? '💵 Efectivo' : '📲 Transferencia'}
                        </button>`).join('')}
                </div>

                <!-- Calculadora de cambio (solo efectivo) -->
                <div id="cambioSection${pid}" class="${metodo==='efectivo'?'':'hidden'} space-y-2">
                    <p class="text-xs font-semibold text-gray-600 dark:text-gray-400">💵 ¿Con cuánto paga?</p>
                    <div class="grid grid-cols-3 gap-1.5">
                        ${BILLETES.map(b => `
                        <button onclick="document.getElementById('billete${pid}').value=${b}; window.recalcChange${pid}();"
                            class="py-1.5 bg-gray-100 dark:bg-slate-700 hover:bg-emerald-100 dark:hover:bg-emerald-900/30 rounded-xl text-xs font-bold active:scale-95 transition-all">
                            $${b}
                        </button>`).join('')}
                    </div>
                    <input type="number" id="billete${pid}" placeholder="O escribe la cantidad exacta..."
                        class="w-full px-3 py-2 border-2 border-gray-200 dark:border-slate-600 rounded-xl dark:bg-slate-700 text-sm focus:border-emerald-400 outline-none"
                        oninput="window.recalcChange${pid}()" step="0.50">
                    <div id="cambioResult${pid}" class="hidden rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-500 mb-0.5">Cambio a dar</p>
                        <p id="cambioValor${pid}" class="text-3xl font-black text-emerald-600">$0.00</p>
                    </div>
                </div>

                <!-- Aviso transferencia -->
                <div id="transSection${pid}" class="${metodo==='transferencia'?'':'hidden'} bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-700 rounded-xl p-3 text-sm text-blue-800 dark:text-blue-300">
                    <p class="font-semibold mb-1">📲 Pago por transferencia</p>
                    <p class="text-xs">Se solicitará confirmación de recepción antes de registrar la venta.</p>
                </div>

                <!-- Botón cobrar -->
                <button onclick="window.processSale()" ${items.length===0?'disabled':''}
                    class="w-full py-4 rounded-2xl font-bold text-lg transition-all
                        ${items.length > 0
                            ? 'bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white shadow-lg shadow-emerald-200 dark:shadow-none'
                            : 'bg-gray-200 dark:bg-slate-700 text-gray-400 cursor-not-allowed'}">
                    <i class="fas fa-check-circle mr-2"></i>COBRAR $${total.toFixed(2)}
                </button>
                ${items.length > 0 ? `<button onclick="window.clearCart()" class="w-full text-xs text-red-400 hover:text-red-600 py-1">🗑️ Vaciar carrito</button>` : ''}
            </div>`;
        }

        // Funciones de cálculo de cambio — una por panel (D = desktop, M = mobile)
        function _makeRecalc(pid) {
            return function() {
                const metodo = window.posPayMethod || 'efectivo';
                const cs = document.getElementById('cambioSection' + pid);
                const ts = document.getElementById('transSection' + pid);
                if (cs) cs.classList.toggle('hidden', metodo !== 'efectivo');
                if (ts) ts.classList.toggle('hidden', metodo !== 'transferencia');
                if (metodo !== 'efectivo') return;
                const total = (window.cart||[]).reduce((s,i)=>s+(i.precio_venta||0)*(i.cantidad||0), 0);
                const billete = parseFloat(document.getElementById('billete' + pid)?.value) || 0;
                const res = document.getElementById('cambioResult' + pid);
                const val = document.getElementById('cambioValor' + pid);
                if (!res || !val || billete <= 0) { res?.classList.add('hidden'); return; }
                const cambio = billete - total;
                res.classList.remove('hidden');
                if (cambio < 0) {
                    res.className = 'rounded-xl p-3 text-center bg-red-50 dark:bg-red-900/20 border border-red-200';
                    val.className = 'text-3xl font-black text-red-600';
                    val.textContent = `Faltan $${Math.abs(cambio).toFixed(2)}`;
                } else {
                    res.className = 'rounded-xl p-3 text-center bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200';
                    val.className = 'text-3xl font-black text-emerald-600';
                    val.textContent = cambio === 0 ? '✅ Pago exacto' : `$${cambio.toFixed(2)}`;
                }
                window._lastBillete = billete;
                window._lastCambio = Math.max(0, cambio);
            };
        }
        window.recalcChangeD = _makeRecalc('D');
        window.recalcChangeM = _makeRecalc('M');

        function refreshCartBadge() {
            const items = window.cart || [];
            const total = items.reduce((s, i) => s + (i.precio_venta||0) * (i.cantidad||0), 0);
            const count = items.reduce((s, i) => s + (i.cantidad||0), 0);
            const badge = document.getElementById('cartBadgeCount');
            const totEl = document.getElementById('cartBadgeTotal');
            if (badge) badge.textContent = count;
            if (totEl) totEl.textContent = `$${total.toFixed(2)}`;
        }

        function refreshCartPanels() {
            const html = renderCartHTML(false);
            const htmlM = renderCartHTML(true);
            const d = document.getElementById('cartPanel');
            const o = document.getElementById('cartOverlay')?.querySelector('.relative');
            if (d) d.innerHTML = html;
            if (o) o.innerHTML = htmlM;
            refreshCartBadge();
            // Resaltar cards en grid
            document.querySelectorAll('.pos-card').forEach(btn => {
                const pid = parseInt(btn.getAttribute('onclick')?.match(/\d+/)?.[0]);
                const inCart = (window.cart||[]).find(c => c.id === pid);
                btn.classList.toggle('border-emerald-400', !!inCart);
                btn.classList.toggle('bg-emerald-50', !!inCart);
            });
        }

        function attachPOSEvents() {
            const inp = document.getElementById('posSearch');
            const drop = document.getElementById('posSearchDropdown');
            if (!inp || !drop) return;

            inp.addEventListener('input', () => {
                const v = inp.value.trim();
                if (!v) { drop.classList.add('hidden'); return; }
                const results = getPOSProducts(v, 'all').slice(0, 8);
                if (results.length === 0) { drop.classList.add('hidden'); return; }
                drop.innerHTML = results.map(p => `
                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 text-left transition-all"
                        onclick="window.posAddProduct(${p.id}); document.getElementById('posSearch').value=''; document.getElementById('posSearchDropdown').classList.add('hidden');">
                        <span class="text-2xl">${p.imagen||'📦'}</span>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm text-gray-800 dark:text-white truncate">${p.nombre||''}</p>
                            <p class="text-xs text-gray-500">${p.categoria||''} · Stock: ${p.stock_puntoventa||0}</p>
                        </div>
                        <span class="font-bold text-emerald-600 text-sm flex-shrink-0">$${(p.precio_venta||0).toFixed(2)}</span>
                    </button>`).join('');
                drop.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!document.getElementById('posSearchWrap')?.contains(e.target)) {
                    drop.classList.add('hidden');
                }
            }, { capture: true });
        }

        window.setPOSCat = function(cat) {
            posCatFilter = cat;
            const rank = getSalesRanking();
            const grid = document.getElementById('posProductGrid');
            if (grid) {
                const list = getPOSProducts('', cat);
                grid.querySelector('.grid').innerHTML = list.map(p => renderPOSCard(p, rank)).join('') ||
                    `<div class="col-span-4 text-center py-12 text-gray-400"><div class="text-5xl mb-3">🔍</div><p>Sin productos en esta categoría</p></div>`;
            }
            // Actualizar estilos de tabs
            document.querySelectorAll('.cat-tab').forEach(btn => {
                const isCurrent = btn.getAttribute('onclick') === `window.setPOSCat('${cat}')`;
                btn.classList.toggle('bg-emerald-600', isCurrent);
                btn.classList.toggle('text-white', isCurrent);
                btn.classList.toggle('shadow-md', isCurrent);
                btn.classList.toggle('bg-white', !isCurrent && !btn.classList.contains('bg-purple-100'));
                btn.classList.toggle('dark:bg-slate-700', !isCurrent && !btn.classList.contains('bg-purple-100'));
                btn.classList.toggle('text-gray-700', !isCurrent && !btn.classList.contains('text-purple-700'));
                btn.classList.toggle('border-gray-200', !isCurrent && !btn.classList.contains('border-purple-200'));
            });
        };

        window.posAddProduct = function(productId) {
            const product = inventory.find(p => p.id === productId);
            if (!product) return;
            if ((product.stock_puntoventa||0) <= 0) {
                const btn = document.querySelector(`[onclick="window.posAddProduct(${productId})"]`);
                if (btn) { btn.style.border = '2px solid #ef4444'; setTimeout(() => btn.style.border = '', 500); }
                return;
            }
            // ── Pharmacy: warn if prescription required ──
            if (product.requiere_receta) {
                const alreadyInCart = (window.cart||[]).find(i => i.id === productId);
                if (!alreadyInCart) {
                    const ok = confirm(`⚠️ "${product.nombre}" requiere receta médica.\n\n¿El cliente presenta receta válida?`);
                    if (!ok) return;
                }
            }
            if (!window.cart) window.cart = [];
            const existing = window.cart.find(i => i.id === productId);
            if (existing) {
                if ((product.stock_puntoventa||0) >= existing.cantidad + 1) {
                    existing.cantidad += 1;
                } else { return; }
            } else {
                window.cart.push({ ...product, cantidad: 1 });
            }
            const rank = getSalesRanking();
            const btn = document.querySelector(`.pos-card[onclick="window.posAddProduct(${productId})"]`);
            if (btn) btn.outerHTML = renderPOSCard(product, rank);
            refreshCartPanels();
        };

        window.addAgrupacionToCart = function(agrupacionId) {
            const ag = agrupaciones.find(a => a.id === agrupacionId);
            if (!ag || !ag.producto_id) return;
            const p = inventory.find(x => x.id === ag.producto_id);
            if (!p) return;
            const totalNecesario = ag.cantidad;
            if ((p.stock_puntoventa||0) < totalNecesario) {
                alert(`Stock insuficiente para "${ag.nombre}". Necesitas ${totalNecesario}, hay ${p.stock_puntoventa||0}.`);
                return;
            }
            if (!window.cart) window.cart = [];
            const pVenta = ag.precio_especial > 0 ? ag.precio_especial : (p.precio_venta||0) * ag.cantidad;
            const existing = window.cart.find(i => i.id === p.id && i._agrupacion === ag.id);
            if (existing) {
                if ((p.stock_puntoventa||0) >= (existing.cantidad + 1) * ag.cantidad) existing.cantidad++;
                else { alert('No hay más stock'); return; }
            } else {
                window.cart.push({ ...p, nombre: ag.nombre, cantidad: 1, precio_venta: pVenta, margen: pVenta - (p.precio_compra||0)*ag.cantidad, _agrupacion: ag.id, _unidades: ag.cantidad });
            }
            refreshCartPanels();
        };

        window.cartQty = function(idx, delta) {
            if (!window.cart || !window.cart[idx]) return;
            const item = window.cart[idx];
            const newQty = (item.cantidad||1) + delta;
            if (newQty <= 0) { window.cart.splice(idx, 1); }
            else {
                const p = inventory.find(x => x.id === item.id);
                const maxStock = p ? (p.stock_puntoventa||0) : 999;
                item.cantidad = Math.min(newQty, maxStock);
            }
            refreshCartPanels();
        };

        window.cartSetQty = function(idx, val) {
            if (!window.cart || !window.cart[idx]) return;
            const q = parseInt(val);
            if (isNaN(q) || q <= 0) { window.cart.splice(idx, 1); }
            else {
                const item = window.cart[idx];
                const p = inventory.find(x => x.id === item.id);
                const maxStock = p ? (p.stock_puntoventa||0) : 999;
                item.cantidad = Math.min(q, maxStock);
            }
            refreshCartPanels();
        };

        window.clearCart = function() {
            if (confirm('¿Vaciar el carrito?')) { window.cart = []; refreshCartPanels(); }
        };

        window.setPosPayMethod = function(m) {
            window.posPayMethod = m;
            document.querySelectorAll('.pay-btn').forEach(btn => {
                const isSel = btn.getAttribute('onclick') === `window.setPosPayMethod('${m}')`;
                btn.classList.toggle('border-emerald-500', isSel);
                btn.classList.toggle('bg-emerald-50', isSel);
                btn.classList.toggle('text-emerald-700', isSel);
                btn.classList.toggle('border-gray-200', !isSel);
                btn.classList.toggle('text-gray-600', !isSel);
            });
        };

        window.toggleCartPanel = function() {
            const overlay = document.getElementById('cartOverlay');
            if (overlay) overlay.classList.toggle('hidden');
        };

        window.removeFromCart = function(idx) {
            if (window.cart) { window.cart.splice(idx, 1); refreshCartPanels(); }
        };

        function updateCartDisplay() { refreshCartPanels(); }

        window.addToCart = function(product) { window.posAddProduct(product.id); };

        window.processSale = function() {
            if (!window.cart || window.cart.length === 0) return;
            const total = window.cart.reduce((s,i) => s+(i.precio_venta||0)*(i.cantidad||0), 0);
            const ganancia = window.cart.reduce((s,i) => s+(i.margen||0)*(i.cantidad||0), 0);
            const metodo = window.posPayMethod || 'efectivo';

            if (metodo === 'transferencia') {
                // Bloquear hasta confirmar recepción
                window._confirmarTransferencia(total, ganancia);
                return;
            }
            // Efectivo: capturar billete y calcular cambio
            const billete = window._lastBillete || 0;
            const cambio = billete > 0 ? Math.max(0, billete - total) : 0;
            if (billete > 0 && billete < total) {
                alert(`⚠️ Pago insuficiente. El cliente necesita ${(total - billete).toFixed(2)} más.`);
                return;
            }
            _finalizarVenta(total, ganancia, metodo, billete, cambio);
        };

        window._confirmarTransferencia = function(total, ganancia) {
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'transferModal';
            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-t-2xl text-center">
                    <div class="text-5xl mb-2">📲</div>
                    <h2 class="text-xl font-bold">Confirmar Transferencia</h2>
                    <p class="text-3xl font-black mt-2">$${total.toFixed(2)}</p>
                </div>
                <div class="p-5 space-y-4">
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-4 text-center">
                        <p class="text-sm text-blue-800 dark:text-blue-300 font-medium">Solicita al cliente que muestre el comprobante de transferencia antes de confirmar.</p>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Referencia o número de confirmación (opcional)</label>
                        <input type="text" id="transRef" placeholder="Ej: Folio 12345, últimos 4 dígitos..."
                            class="w-full px-3 py-2 border-2 border-gray-200 dark:border-slate-600 rounded-xl dark:bg-slate-700 text-sm focus:border-blue-400 outline-none">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window._aprobarTransferencia(${total.toFixed(4)}, ${ganancia.toFixed(4)})"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white py-3 rounded-xl font-bold transition-all">
                            ✅ Confirmar — Recibí el pago
                        </button>
                    </div>
                    <button onclick="this.closest('.modal').remove()"
                        class="w-full text-sm text-gray-400 hover:text-gray-600 py-2">
                        Cancelar — El pago aún no llega
                    </button>
                </div>
            </div>`;
            document.body.appendChild(modal);
        };

        window._aprobarTransferencia = function(total, ganancia) {
            const ref = document.getElementById('transRef')?.value?.trim() || '';
            document.querySelectorAll('.modal').forEach(m => m.remove());
            _finalizarVenta(total, ganancia, 'transferencia', 0, 0, ref);
        };

        function _finalizarVenta(total, ganancia, metodo, billete, cambio, ref) {
            const cartSnapshot = [...(window.cart||[])];
            cartSnapshot.forEach(item => {
                // Los productos producidos al momento (_esProducido) ya descontaron ingredientes
                // al producirlos; no hay que descontar stock de PV de un producto que no existe
                if (item._esProducido) {
                    registerMovement(String(item._recetaId||item.id),'Venta Producido',item.cantidad||1,'produccion','cliente',
                        `Venta POS · ${metodo} · Receta ${item.nombre}`);
                    return;
                }
                const product = inventory.find(p => p.id === item.id);
                if (product) {
                    const unidades = (item._unidades||1)*(item.cantidad||0);
                    product.stock_puntoventa = Math.max(0,(product.stock_puntoventa||0)-unidades);
                    registerMovement(item.id,'Venta',unidades,'punto_venta','cliente',`Venta POS · ${metodo}${ref?' · Ref:'+ref:''}`);
                }
            });
            const sale = {
                id: (sales.length ? Math.max(...sales.map(s=>s.id)) : 0)+1,
                total, ganancia, metodo_pago: metodo,
                billete_pago: billete, cambio_dado: cambio,
                referencia_trans: ref || null,
                usuario_id: currentUser?.id,
                productos: cartSnapshot.map(c=>({id:c.id,nombre:c.nombre,cantidad:(c._unidades||1)*(c.cantidad||0)})),
                fecha: new Date().toISOString()
            };
            sales.push(sale);
            saveData();
            window.cart = [];
            window._lastBillete = 0;
            window._lastCambio = 0;
            document.getElementById('cartOverlay')?.classList.add('hidden');

            // Ticket rápido en pantalla
            const lines = cartSnapshot.map(i=>`  ${(i.nombre||'').padEnd(20).slice(0,20)} ×${i.cantidad}  $${((i.precio_venta||0)*(i.cantidad||0)).toFixed(2)}`).join('\n');
            let resumen = `✅ VENTA REGISTRADA\n${'─'.repeat(32)}\n${lines}\n${'─'.repeat(32)}\nTOTAL: $${total.toFixed(2)}\nPago: ${metodo}`;
            if (billete > 0) resumen += `\nEfectivo: $${billete.toFixed(2)}\nCambio: $${cambio.toFixed(2)}`;
            if (ref) resumen += `\nRef: ${ref}`;
            renderSalesView();
            // Toast no bloqueante en lugar de alert
            (function(msg) {
                let t = document.getElementById('saleSuccessToast');
                if (!t) {
                    t = document.createElement('div');
                    t.id = 'saleSuccessToast';
                    t.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99999;max-width:90vw;pointer-events:none;transition:opacity .3s;';
                    document.body.appendChild(t);
                }
                const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
                t.innerHTML = `<div class="bg-emerald-600 text-white rounded-2xl shadow-2xl px-5 py-3 text-sm font-semibold">${safe}</div>`;
                t.style.opacity = '1';
                setTimeout(() => { t.style.opacity = '0'; }, 4500);
            })(resumen);
        }
        
        // Tipos de entrada configurables
        let tiposEntrada = JSON.parse(localStorage.getItem('tiposEntrada')) || [
            { id: 1, nombre: 'Adulto', precio: null, activo: true },   // null = usa precioEntrada global
            { id: 2, nombre: 'Niño (3-10)',   precio: null, factor: 0.5, activo: true },
            { id: 3, nombre: 'Adulto Mayor',  precio: null, factor: 0.7, activo: true },
        ];
        function saveTiposEntrada() { localStorage.setItem('tiposEntrada', JSON.stringify(tiposEntrada)); }

        // Configuración de descuento grupal

                            </div>`).join('')}

                    <!-- CONTADOR RÁPIDO + HISTORIAL HOY -->

        window.cotTipoQty = function(tipoId, delta) {
            const inp = document.getElementById('cotTipo_' + tipoId);
            if (!inp) return;
            inp.value = Math.max(0, parseInt(inp.value||0) + delta);
            window.calcularCot();
        };

        window.calcularCot = function() {
            const tiposActivos = tiposEntrada.filter(t => t.activo !== false);
            let totalPersonas = 0;
            let subtotal = 0;
            let desglose = [];

            for (const t of tiposActivos) {
                const qty = parseInt(document.getElementById('cotTipo_' + t.id)?.value) || 0;
                if (qty > 0) {
                    const precio = precioTipo(t);
                    totalPersonas += qty;
                    subtotal += qty * precio;
                    desglose.push(`${qty}×${t.nombre}`);
                }
            }

            const descRow = document.getElementById('descuentoRow');
            if (descRow) descRow.classList.toggle('hidden', totalPersonas <= grupoConfig.minPersonas);

            const aplicarDesc = document.getElementById('cotAplicarDesc')?.checked && totalPersonas > grupoConfig.minPersonas;
            const descPct = aplicarDesc ? (parseFloat(document.getElementById('cotDescuento')?.value)||0) : 0;
            const descMonto = subtotal * (descPct/100);
            const total = subtotal - descMonto;
            window._cotTotal = total;
            window._cotPersonas = totalPersonas;
            window._cotDescuento = descPct;
            window._cotDesglose = desglose.join(', ');

            const resultado = document.getElementById('cotResultado');
            if (resultado) {
                if (totalPersonas === 0) {
                    resultado.innerHTML = `<p class="text-center text-gray-400 text-sm">Agrega personas para calcular</p>`;
                } else {
                    resultado.innerHTML = `
                    ${desglose.map(d => {
                        const [qty, ...resto] = d.split('×');
                        const nombre = resto.join('×');
                        const t = tiposActivos.find(x => x.nombre === nombre);
                        const precio = t ? precioTipo(t) : precioEntrada;
                        return `<div class="flex justify-between text-sm"><span class="text-gray-600 dark:text-gray-400">${d} × $${precio.toFixed(2)}</span><span>$${(parseInt(qty)*precio).toFixed(2)}</span></div>`;
                    }).join('')}
                    ${descMonto > 0 ? `<div class="flex justify-between text-sm text-amber-600"><span>🎁 Descuento grupo ${descPct}%</span><span>−$${descMonto.toFixed(2)}</span></div>` : ''}
                    <div class="flex justify-between font-bold text-xl border-t border-gray-200 dark:border-slate-600 pt-2 mt-1">
                        <span class="text-gray-800 dark:text-white">Total (${totalPersonas} personas)</span>
                        <span class="text-emerald-600">$${total.toFixed(2)}</span>
                    </div>`;
                }
            }
            // Deshabilitar cobrar si no hay personas
            const btn = document.getElementById('btnCobrarEntrada');
            if (btn) btn.disabled = totalPersonas === 0;
            window.calcularCambio();
        };

        window.calcularCambio = function() {
            const billete = parseFloat(document.getElementById('cotBillete')?.value) || 0;
            const total = window._cotTotal || 0;
            const cambioRow = document.getElementById('cotCambioRow');
            const cambioEl = document.getElementById('cotCambio');
            const label = document.getElementById('cotCambioLabel');
            if (!cambioRow || !cambioEl) return;
            if (billete <= 0 || total === 0) { cambioRow.classList.add('hidden'); return; }
            const cambio = billete - total;
            cambioRow.classList.remove('hidden');
            if (cambio < 0) {
                cambioRow.className = 'rounded-2xl p-4 bg-red-50 dark:bg-red-900/20 border border-red-200';
                cambioEl.className = 'text-4xl font-black text-red-600';
                cambioEl.textContent = `Faltan $${Math.abs(cambio).toFixed(2)}`;
                if (label) { label.textContent = '⚠️ Pago insuficiente:'; label.className = 'font-bold text-lg text-red-700 dark:text-red-400'; }
            } else {
                cambioRow.className = 'rounded-2xl p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200';
                cambioEl.className = 'text-4xl font-black text-emerald-600';
                cambioEl.textContent = `$${cambio.toFixed(2)}`;
                if (label) { label.textContent = cambio === 0 ? '✅ Pago exacto' : '💵 Cambio a dar:'; label.className = 'font-bold text-lg'; }
            }
        };

        window.cobrarEntrada = function() {
            const totalPersonas = window._cotPersonas || 0;
            if (totalPersonas === 0) { alert('Agrega al menos una persona'); return; }
            const total = window._cotTotal || 0;
            const descPct = window._cotDescuento || 0;
            const desglose = window._cotDesglose || '';

            if (!peopleCount.history) peopleCount.history = [];
            peopleCount.total = (peopleCount.total || 0) + totalPersonas;
            peopleCount.history.push({
                id: peopleCount.history.length + 1,
                accion: 'entrada',
                cantidad: totalPersonas,
                cobrado: total,
                descuento: descPct,
                desglose,
                usuario_id: currentUser?.id,
                usuario_nombre: currentUser?.nombre,
                fecha: new Date().toISOString()
            });
            saveData();
            renderPeopleView();
        };

        window.showTiposEntradaModal = function() {
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            const renderT = () => tiposEntrada.map((t,i) => `

                    <div class="flex-1 min-w-0">

                    <button onclick="window._toggleTipoEntrada(${i})" class="p-1 ${t.activo===false?'text-gray-400':'text-emerald-500'}">

                    </button>
                    <button onclick="window._deleteTipoEntrada(${i})" class="p-1 text-red-400"><i class="fas fa-trash text-xs"></i></button>
                </div>`).join('');

            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden">
                <div class="p-5 bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-t-2xl flex justify-between">
                    <h2 class="font-bold">🎟️ Tipos de Entrada y Precios</h2>
                    <button onclick="this.closest('.modal').remove()" class="hover:bg-white/20 rounded p-1"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 overflow-y-auto flex-1 space-y-4">
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3">
                        <p class="text-sm font-semibold text-blue-800 dark:text-blue-300 mb-2">💰 Precio base adulto: $${precioEntrada}</p>
                        <button onclick="window.showEditPrecioEntradaModal()" class="text-xs text-blue-600 underline">Cambiar precio base</button>
                    </div>
                    <div class="bg-amber-50 dark:bg-amber-900/20 rounded-xl p-3">
                        <p class="text-sm font-semibold text-amber-800 dark:text-amber-300 mb-2">🎁 Descuento grupal</p>
                        <div class="flex gap-2 items-center text-sm">
                            <span>Mínimo</span>
                            <input type="number" id="gcMin" value="${grupoConfig.minPersonas}" min="1" class="w-16 px-2 py-1 border rounded-lg dark:bg-slate-700 text-center">
                            <span>personas · descuento por defecto</span>
                            <input type="number" id="gcDesc" value="${grupoConfig.descuentoDefault}" min="0" max="100" class="w-16 px-2 py-1 border rounded-lg dark:bg-slate-700 text-center">
                            <span>%</span>
                        </div>
                        <button onclick="grupoConfig.minPersonas=parseInt(document.getElementById('gcMin').value)||10; grupoConfig.descuentoDefault=parseInt(document.getElementById('gcDesc').value)||10; saveGrupoConfig(); alert('✅ Guardado');" class="mt-2 text-xs bg-amber-500 text-white px-3 py-1 rounded-lg">Guardar</button>
                    </div>
                    <div id="tiposList" class="space-y-2">${renderT()}</div>
                    <div class="border-t border-gray-200 dark:border-slate-700 pt-3">
                        <p class="text-sm font-semibold mb-2">Agregar tipo</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="tNombre" placeholder="Nombre (ej: Niño)" class="col-span-2 px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm">
                            <div><label class="text-xs text-gray-500">Factor (0.5 = 50%)</label>
                                <input type="number" id="tFactor" value="1" step="0.1" min="0" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm"></div>
                            <div><label class="text-xs text-gray-500">O precio fijo (deja 0 para usar factor)</label>
                                <input type="number" id="tPrecio" value="0" step="0.5" min="0" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm"></div>
                            <button onclick="window._addTipoEntrada()" class="col-span-2 bg-purple-600 text-white py-2 rounded-xl text-sm font-semibold">Agregar</button>
                        </div>
                    </div>
                </div>
            </div>`;
            document.body.appendChild(modal);
            window._toggleTipoEntrada = (i) => { tiposEntrada[i].activo = tiposEntrada[i].activo===false ? true : false; saveTiposEntrada(); document.getElementById('tiposList').innerHTML = renderT(); };
            window._deleteTipoEntrada = (i) => { if (!confirm('¿Eliminar tipo?')) return; tiposEntrada.splice(i,1); saveTiposEntrada(); document.getElementById('tiposList').innerHTML = renderT(); };
            window._addTipoEntrada = () => {
                const nombre = document.getElementById('tNombre')?.value?.trim();
                if (!nombre) { alert('Nombre obligatorio'); return; }
                const factor = parseFloat(document.getElementById('tFactor')?.value)||1;
                const precio = parseFloat(document.getElementById('tPrecio')?.value)||0;
                tiposEntrada.push({ id: Date.now(), nombre, factor, precio: precio > 0 ? precio : null, activo: true });
                saveTiposEntrada();
                document.getElementById('tiposList').innerHTML = renderT();
                document.getElementById('tNombre').value = '';
            };
        };

        window.showEditPrecioEntradaModal = function() {
            const nuevo = prompt('Precio de entrada base por persona adulta ($):', precioEntrada);
            if (nuevo !== null && !isNaN(parseFloat(nuevo)) && parseFloat(nuevo) > 0) {
                savePrecioEntrada(parseFloat(nuevo));
                renderPeopleView();
            }
        };
        
        // Quick solicitud desde fila de inventario
        window._quickSolProd = function(prodId) {
            const p = inventory.find(x => x.id === prodId);
            if (!p) return;
            const qty = prompt(`¿Cuántas unidades de "${p.nombre}" necesitas del almacén?\n(Disponible en almacén: ${p.stock_almacen||0})`, '1');
            if (!qty || isNaN(parseInt(qty)) || parseInt(qty) <= 0) return;
            const motivo = prompt('Motivo (opcional):') || '';
            const newId = solicitudesInv.length ? Math.max(...solicitudesInv.map(s=>s.id)) + 1 : 1;
            solicitudesInv.push({
                id: newId, tipo: 'pedido', estado: 'pendiente',
                producto_id: prodId, producto_nombre: p.nombre,
                cantidad: parseInt(qty), motivo,
                usuario_id: currentUser?.id, usuario_nombre: currentUser?.nombre,
                fecha: new Date().toISOString()
            });
            saveSolicitudes();
            alert(`✅ Solicitud de ${qty} "${p.nombre}" enviada al administrador`);
        };

        function renderProfitsView() {
            if (currentUser?.role !== 'admin') { currentView = 'sales'; render(); return; }
            const container = document.getElementById('viewContainer');
            if (!container) return;

            const now = new Date();
            const todayStr = now.toDateString();
            const mesStart = new Date(now.getFullYear(), now.getMonth(), 1);

            // Hoy
            const vHoy = sales.filter(s => new Date(s.fecha).toDateString() === todayStr);
            const ingHoy = vHoy.reduce((a,s)=>a+(s.total||0),0);
            const ganHoy = vHoy.reduce((a,s)=>a+(s.ganancia||0),0);
            const costHoy = getTotalVariableCosts(new Date(new Date().setHours(0,0,0,0)).toISOString(), now.toISOString());

            // Fin de semana actual (Vie-Dom)
            const dow = now.getDay();
            const fri = new Date(now);
            fri.setDate(now.getDate() - (dow===0?6:dow===6?1:dow===5?0:dow-5+7));
            fri.setHours(0,0,0,0);
            const mon = new Date(fri); mon.setDate(fri.getDate()+3);
            const vFin = sales.filter(s=>{const f=new Date(s.fecha);return f>=fri&&f<mon;});
            const ingFin = vFin.reduce((a,s)=>a+(s.total||0),0);
            const ganFin = vFin.reduce((a,s)=>a+(s.ganancia||0),0);
            const costFin = getTotalVariableCosts(fri.toISOString(), mon.toISOString());
            const entFin = (peopleCount.history||[]).filter(h=>{const f=new Date(h.fecha);return f>=fri&&f<mon&&h.accion==='entrada';}).reduce((a,h)=>a+(h.cantidad||0),0);

        window._showAlmacenModal = function(id, tipo) {
            const existing = id ? almacenes.find(a => a.id === id) : null;
            const tipoLabel = tipo === 'almacen' ? 'Almacén' : 'Punto de Venta';
            const icon = tipo === 'almacen' ? '🏭' : '🛒';
            document.querySelectorAll('.modal').forEach(m => m.remove());
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md">
                <div class="p-5 border-b border-gray-200 dark:border-slate-700 flex items-center gap-3">
                    <span class="text-2xl">${icon}</span>
                    <h3 class="font-bold text-gray-800 dark:text-white">${existing?'Editar':'Nuevo'} ${tipoLabel}</h3>
                    <button onclick="this.closest('.modal').remove()" class="ml-auto text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nombre *</label>
                        <input type="text" id="alm_nombre" value="${existing?.nombre||''}" placeholder="Ej: Almacén Norte" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Descripción</label>
                        <input type="text" id="alm_desc" value="${existing?.descripcion||''}" placeholder="Descripción opcional" class="w-full px-3 py-2 border rounded-xl dark:bg-slate-700 text-sm">
                    </div>
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="alm_activo" ${existing?.activo!==false?'checked':''} class="w-5 h-5 rounded accent-emerald-500">
                        <span class="text-sm font-medium">Activo</span>
                    </label>
                </div>
                <div class="p-5 border-t border-gray-200 dark:border-slate-700 flex gap-3">
                    <button onclick="window._saveAlmacen(${id||'null'},'${tipo}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl font-semibold text-sm">
                        <i class="fas fa-save mr-1"></i>${existing?'Guardar cambios':'Crear'}
                    </button>
                    <button onclick="this.closest('.modal').remove()" class="px-5 bg-gray-100 dark:bg-slate-700 rounded-xl text-sm font-semibold">Cancelar</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
        };

        window._saveAlmacen = function(id, tipo) {
            const nombre = document.getElementById('alm_nombre')?.value?.trim();
            const descripcion = document.getElementById('alm_desc')?.value?.trim() || '';
            const activo = document.getElementById('alm_activo')?.checked !== false;
            if (!nombre) { alert('El nombre es obligatorio'); return; }
            if (id) {
                const a = almacenes.find(x => x.id === id);
                if (a) { a.nombre = nombre; a.descripcion = descripcion; a.activo = activo; }
            } else {
                const maxId = almacenes.reduce((m, a) => Math.max(m, a.id), 0);
                almacenes.push({ id: maxId+1, nombre, tipo, descripcion, activo });
            }
            saveAlmacenes();
            document.querySelectorAll('.modal').forEach(m => m.remove());
            renderConfigView();
        };

        window._toggleAlmacenActivo = function(id) {
            const a = almacenes.find(x => x.id === id);
            if (a) { a.activo = a.activo === false ? true : false; saveAlmacenes(); renderConfigView(); }
        };

        window._deleteAlmacen = function(id) {
            if (!confirm('¿Eliminar esta ubicación? Los datos de inventario no se verán afectados.')) return;
            almacenes = almacenes.filter(a => a.id !== id);
            saveAlmacenes();
            renderConfigView();
        };

        window.showChangePasswordModal = async function(userId) {
            const u = users.find(x => x.id === userId);
            if (!u) return;
            const newRole = prompt(`Cambiar rol de "${u.nombre}".\nRol actual: ${u.role}\n\nEscribe el nuevo rol: "admin" o "empleado"`);
            if (!newRole || !['admin','empleado'].includes(newRole.trim().toLowerCase())) {
                if (newRole !== null) alert('Rol inválido. Usa "admin" o "empleado"');
                return;
            }
            u.role = newRole.trim().toLowerCase();
            if (db && syncEnabled) {
                await db.collection(COL.users).doc(String(u.id)).update({ role: u.role }).catch(e => console.warn(e));
            }
            saveData();
            alert(`✅ Rol de "${u.nombre}" actualizado a: ${u.role}`);
            renderConfigView();
        };
        
        window.changeView = function(view) {
            currentView = view;
            if (window.innerWidth < 768) { _sbCollapsed = true; localStorage.setItem('sf_sb_collapsed', '1'); }
            render();
            // Re-apply sidebar state after render (render rebuilds the DOM)
            requestAnimationFrame(() => _applySidebar());
        };
        
        window.logout = function() {
            currentUser = null;
            if (firebase.apps.length) {
                firebase.auth().signOut().catch(() => {});
            }
            render();
        };
        
        window.toggleTheme = function() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            const isDark = currentTheme === 'dark';
            // Apply to <html> so all Tailwind dark: classes activate immediately
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            // Update all theme icons/labels in the DOM without re-render
            document.querySelectorAll('.theme-icon').forEach(el => {
                el.className = 'fas ' + (isDark ? 'fa-sun' : 'fa-moon') + ' mr-1 theme-icon';
            });
            document.querySelectorAll('.theme-label').forEach(el => {
                el.textContent = isDark ? 'Claro' : 'Oscuro';
            });
            // Login page specific icons (different class names to avoid collision)
            document.querySelectorAll('.login-theme-icon').forEach(el => {
                el.className = 'fas ' + (isDark ? 'fa-sun' : 'fa-moon') + ' login-theme-icon';
            });
            document.querySelectorAll('.login-theme-label').forEach(el => {
                el.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
            });
            // Only re-render the login page (to sync the input type/label text)
            // The dashboard re-renders naturally on next interaction
            if (!currentUser) render();
        };
        
        window.addPerson = function() {
            // Entrada rápida de 1 persona al precio normal
            peopleCount.total = (peopleCount.total || 0) + 1;
            if (!peopleCount.history) peopleCount.history = [];
            peopleCount.history.push({

                accion: 'entrada',

                fecha: new Date().toISOString()

            saveData();

                if (!peopleCount.history) peopleCount.history = [];
                peopleCount.history.push({

        window.exportToExcel = function(type) {
            let data = [];
            let sheetName = type;
            if (type === 'inventory') {
                data = inventory.map(p => ({
                    'SKU': p.sku || '',
                    'Producto/Nombre': p.nombre || '',
                    'Categoría': p.categoria || '',
                    'Descripción': p.descripcion || '',
                    'Stock_Almacen': p.stock_almacen || 0,
                    'Stock_PuntoVenta': p.stock_puntoventa || 0,
                    'Precio_Compra': parseFloat((p.precio_compra || 0).toFixed(2)),
                    'Precio_Venta': parseFloat((p.precio_venta || 0).toFixed(2)),
                    'Código_Barras': p.codigo_barras || '',
                    'Proveedor': p.proveedores && p.proveedores[0] ? p.proveedores[0].nombre : '',
                    'Elasticidad': parseFloat((p.elasticidad || 1.0).toFixed(2)),
                    'Icono/Imagen': p.imagen || '📦'
                }));
            } else if (type === 'movements') {
                data = movements;
            } else if (type === 'sales') {
                data = sales;
            } else if (type === 'variablecosts') {
                data = variableCosts;
            }
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, `${type}_${new Date().toISOString().split('T')[0]}.xlsx`);
        };
        
        window.addUser = async function() {
            const email = document.getElementById('newEmail')?.value?.trim();
            const password = document.getElementById('newPassword')?.value;
            const nombre = document.getElementById('newNombre')?.value?.trim();
            const role = document.getElementById('newRole')?.value;

            if (!email || !password || !nombre) { alert('Complete todos los campos'); return; }
            if (password.length < 6) { alert('La contraseña debe tener al menos 6 caracteres'); return; }
            if (!firebase.apps.length || !syncEnabled) { alert('Firebase no está conectado. Configura Firebase primero.'); return; }

            try {
                // Save current user credentials to re-login after creating new user
                // Use a secondary auth instance workaround: create via Admin API not possible in browser.
                // Instead, create user profile in Firestore and let them use password reset to set their password.
                // OR: use createUserWithEmailAndPassword which signs in as the new user.
                // Best approach: create in Firestore only, send password reset email.

                const newProfile = {
                    id: 'pending_' + Date.now(),
                    email,
                    nombre,
                    role,
                    creado_por: currentUser?.nombre || 'Admin',
                    fecha_creacion: new Date().toISOString(),
                    pendiente_activacion: true
                };

                // Check for duplicates
                const existing = await db.collection(COL.users).where('email', '==', email).get();
                if (!existing.empty) { alert('Ya existe un usuario con ese correo'); return; }

                await db.collection(COL.users).doc(newProfile.id).set(newProfile);
                users.push({ id: newProfile.id, email, role, nombre });
                saveData();
                renderConfigView();
